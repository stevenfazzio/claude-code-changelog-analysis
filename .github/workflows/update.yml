name: Update changelog

on:
  schedule:
    - cron: "25 * * * *" # every hour at :25
  workflow_dispatch: # allow manual runs

permissions:
  contents: write
  issues: write

concurrency:
  group: changelog-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
          enable-cache: true

      - name: Install dependencies
        run: uv sync

      - name: Run pipeline
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CO_API_KEY: ${{ secrets.CO_API_KEY }}
          GH_TOKEN: ${{ github.token }}
        run: uv run python scripts/run_pipeline.py

      - name: Commit and push if changed
        run: |
          git add data/ CHANGELOG.md
          git add -f docs/index.html docs/analysis.html docs/map.html docs/data/
          git diff --cached --quiet && exit 0
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "Auto-update changelog data and site"
          git push

  notify:
    runs-on: ubuntu-latest
    needs: update
    if: failure()
    steps:
      - uses: actions/checkout@v4
      - name: Create issue on failure
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          existing=$(gh issue list --label "pipeline-failure" --state open --json number --jq 'length')
          if [ "$existing" -gt 0 ]; then
            echo "Open pipeline-failure issue already exists, skipping."
            exit 0
          fi
          gh issue create \
            --title "Pipeline failure: auto-update workflow" \
            --label "pipeline-failure" \
            --body "The changelog auto-update workflow failed.\n\nRun: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
