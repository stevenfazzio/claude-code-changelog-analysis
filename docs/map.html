function debounce(func, timeout = 250) {
  let timer;
  return (...args) => {
    clearTimeout(timer);
    timer = setTimeout(() => { func.apply(this, args); }, timeout);
  };
}

async function simpleArrowParser(arrow_bytes) {
  const table = await Arrow.tableFromIPC(arrow_bytes);
  const result = {};
  table.schema.fields.forEach((field) => {
    result[field.name] = table.getChild(field.name).toArray();
  });
  return result;
}

function mergeTypedArrays(arrays) {
  let totalLength = arrays.reduce((acc, arr) => acc + arr.length, 0);
  let result = new arrays[0].constructor(totalLength);
  let currentLength = 0;
  for (let arr of arrays) {
    result.set(arr, currentLength);
    currentLength += arr.length;
  }
  return result;
}



function updateProgressBar(id, progress) {
  const progressBar = document.querySelector(`#${id} .datamapplot-progress-bar-fill`);
  const progressText = document.querySelector(`#${id} .datamapplot-progress-bar-text`);
  if (progressBar && progressText) {
    progressBar.style.width = `${progress}%`;
    progressText.textContent = `${id.replace('-progress', '').replace(/-/g, ' ').replace(/\b\w/g, l => l.toUpperCase())}: ${progress}%`;
  }
}

function checkAllDataLoaded() {
  const progressBars = document.querySelectorAll('.datamapplot-progress-bar-fill');
  const allLoaded = Array.from(progressBars).every(bar => bar.style.width === '100%');
  if (allLoaded) {
    const loadingEl = document.getElementById("loading");
    const progressEl = document.getElementById("progress-container");
    if (loadingEl) loadingEl.style.display = "none";
    if (progressEl) progressEl.style.display = "none";
    // Dispatch unified event for widgets to listen on
    document.dispatchEvent(new CustomEvent('datamapDataLoaded'));
  }
}

// =============================================================================
// Density Tile Image Resolver
// =============================================================================

async function resolveDensityTileImages(tilePyramids) {
  // When running inside a Jupyter notebook with file-based data, image URLs
  // point at the Jupyter contents API which returns JSON with base64 content
  // instead of raw image bytes.  Detect this and convert to blob URLs so that
  // deck.gl BitmapLayer can consume them.
  const allTiles = [];
  for (const field of Object.keys(tilePyramids)) {
    for (const level of tilePyramids[field]) {
      for (const tile of level) {
        allTiles.push(tile);
      }
    }
  }
  if (allTiles.length === 0) return;

  // Only need special handling when the URL routes through /api/contents/
  const needsResolve = allTiles[0].image.includes('/api/contents/');
  if (!needsResolve) return;

  const headers = {};
  const densityApiToken = (typeof DENSITY_API_TOKEN !== 'undefined') ? DENSITY_API_TOKEN : null;
  if (densityApiToken) {
    headers['Authorization'] = 'Token ' + densityApiToken;
  }

  await Promise.all(allTiles.map(async (tile) => {
    try {
      const resp = await fetch(tile.image, { headers });
      if (!resp.ok) {
        console.error('Failed to fetch density tile:', tile.image, resp.status);
        return;
      }
      const json = await resp.json();
      const b64 = json.content;  // Jupyter contents API base64 field
      const bin = atob(b64);
      const bytes = new Uint8Array(bin.length);
      for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
      const blob = new Blob([bytes], { type: 'image/png' });
      tile.image = URL.createObjectURL(blob);
    } catch (e) {
      console.error('Error resolving density tile image:', e);
    }
  }));
}

      group.innerHTML = html;
      (this._currentSection || this.container).appendChild(group);

      // Collapsible subsection toggle
      if (isCollapsible) {
        const labelRow = group.querySelector('.filter-group-label');
        const checkboxList = group.querySelector('.filter-checkbox-list');
        const arrow = group.querySelector('.filter-subsection-arrow');
        labelRow.addEventListener('click', (e) => {
          if (e.target.closest('.filter-group-actions')) return;
          const isCollapsed = checkboxList.classList.toggle('collapsed');
          arrow.classList.toggle('collapsed', isCollapsed);
          this.serializeState();
        });
      }

      const checkboxes = group.querySelectorAll('input[type="checkbox"]');
      const fieldValues = this.hoverData[field];

      this.filters[filterId] = { type: 'checkbox', checkboxes, fieldValues, values, group, name };

      const onChange = () => {
        const checked = new Set();
        checkboxes.forEach(cb => { if (cb.checked) checked.add(cb.value); });
        const allChecked = checked.size === values.length;

        if (allChecked) {
          this.datamap.removeSelection(filterId);
        } else {
          const indices = [];
          for (let i = 0; i < fieldValues.length; i++) {
            if (checked.has(fieldValues[i])) {
              indices.push(i);
            }
          }
          this.datamap.addSelection(indices, filterId);
        }
        group.classList.toggle('filter-group-active', !allChecked);
        this.syncLegendOpacity(filterId);
        this.updateMatchCount();
        this.serializeState();
        this._updateResetButtonState();
        track('Map Filter', {group: name, values: Array.from(checked).join(',')});
      };

      checkboxes.forEach(cb => cb.addEventListener('change', onChange));

      document.getElementById(allId).addEventListener('click', () => {
        checkboxes.forEach(cb => { cb.checked = true; });
        onChange();
      });
      document.getElementById(noneId).addEventListener('click', () => {
        checkboxes.forEach(cb => { cb.checked = false; });
        onChange();
      });
    }

    setupLegendSync() {
      const colorSelector = this.datamap.colorSelector;
      if (!colorSelector || !colorSelector.legends) return;

      for (const [field, filterId] of Object.entries(this.colormapFieldToFilterId)) {
        this.patchLegendContainer(field, filterId, colorSelector);
      }

      // Monkey-patch handleColorMapSelection to sync legend on colormap switch
      const origHandler = colorSelector.handleColorMapSelection.bind(colorSelector);
      const self = this;
      colorSelector.handleColorMapSelection = function(field) {
        origHandler(field);
        self.onColormapChanged(field);
        self.serializeState();
        track('Map Colormap', {field: field.field || field.description || String(field)});
      };
    }

    patchLegendContainer(field, filterId, colorSelector) {
      const origContainer = colorSelector.legends[field];
      if (!origContainer) return;

      const newContainer = origContainer.cloneNode(true);
      origContainer.parentNode.replaceChild(newContainer, origContainer);
      colorSelector.legends[field] = newContainer;

      const items = newContainer.querySelectorAll('.legend-item');
      this.patchedLegends[field] = { container: newContainer, items };

      const self = this;
      newContainer.addEventListener('click', function(e) {
        const legendItem = e.target.closest('.legend-item');
        if (!legendItem) return;
        const labelEl = legendItem.querySelector('.legend-label');
        if (!labelEl) return;
        const category = labelEl.textContent.trim();

        const filter = self.filters[filterId];
        if (!filter || filter.type !== 'checkbox') return;

        let matchingCb = null;
        filter.checkboxes.forEach(cb => {
          if (cb.value === category) matchingCb = cb;
        });
        if (!matchingCb) return;

        const allChecked = Array.from(filter.checkboxes).every(cb => cb.checked);
        if (allChecked) {
          filter.checkboxes.forEach(cb => { cb.checked = (cb.value === category); });
        } else {
          const checkedCbs = Array.from(filter.checkboxes).filter(cb => cb.checked);
          if (checkedCbs.length === 1 && checkedCbs[0].value === category) {
            filter.checkboxes.forEach(cb => { cb.checked = true; });
          } else {
            matchingCb.checked = !matchingCb.checked;
          }
        }
        matchingCb.dispatchEvent(new Event('change'));
      });

      this.syncLegendOpacity(filterId);
    }

    syncLegendOpacity(filterId) {
      const field = this.filterIdToColormapField[filterId];
      if (!field || !this.patchedLegends[field]) return;

      const filter = this.filters[filterId];
      if (!filter || filter.type !== 'checkbox') return;

      const checked = new Set();
      filter.checkboxes.forEach(cb => { if (cb.checked) checked.add(cb.value); });
      const allChecked = checked.size === filter.values.length;

      this.patchedLegends[field].items.forEach(item => {
        const labelEl = item.querySelector('.legend-label');
        if (!labelEl) return;
        const label = labelEl.textContent.trim();
        item.style.opacity = (allChecked || checked.has(label)) ? 1 : 0.25;
      });
    }

    onColormapChanged(field) {
      const filterId = this.colormapFieldToFilterId[field];
      if (filterId) this.syncLegendOpacity(filterId);
    }

    updateFilterBodyHeight() {
      const body = document.getElementById('filter-body');
      const colormap = document.getElementById('colormap-selector-container');
      if (!colormap) return;
      const bodyTop = body.getBoundingClientRect().top;
      const colormapTop = colormap.getBoundingClientRect().top;
      const available = colormapTop - bodyTop - 20;
      if (available > 0) body.style.maxHeight = available + 'px';
    }

    _updateResetButtonState() {
      const resetBtn = document.getElementById('filter-reset-inline');
      let anyActive = false;
      for (const [filterId, f] of Object.entries(this.filters)) {
        if (f.type === 'range') {
          if (!(f.state.minVal <= f.min && f.state.maxVal >= f.sliderMax)) {
            anyActive = true;
            break;
          }
        } else if (f.type === 'checkbox') {
          const allChecked = Array.from(f.checkboxes).every(cb => cb.checked);
          if (!allChecked) {
            anyActive = true;
            break;
          }
        }
      }
      resetBtn.classList.toggle('filter-reset-active', anyActive);
    }

    updateMatchCount() {
      const mgr = this.datamap.dataSelectionManager;
      const hasSelections = Object.keys(mgr.selectedIndicesByItem).length > 0;
      if (hasSelections) {
        const selected = mgr.getSelectedIndices();
        this.matchCountEl.textContent = `${selected.size.toLocaleString()} of ${this.totalCount.toLocaleString()} entries`;
      } else {
        this.matchCountEl.textContent = `${this.totalCount.toLocaleString()} of ${this.totalCount.toLocaleString()} entries`;
      }
    }

    serializeState() {
      const params = new URLSearchParams();

      // Colormap
      const colorSelector = this.datamap.colorSelector;
      if (colorSelector && colorSelector.selectedColorMap) {
        const field = colorSelector.selectedColorMap.field;
        if (field && field !== 'none') params.set('cm', field);
      }

      // Range filters
      for (const [paramKey, filterId] of Object.entries(PARAM_KEY_MAP)) {
        const f = this.filters[filterId];
        if (!f || f.type !== 'range') continue;
        const isFullRange = f.state.minVal <= f.min && f.state.maxVal >= f.sliderMax;
        if (!isFullRange) {
          params.set(paramKey, `${f.state.minVal}-${f.state.maxVal}`);
        }
      }

      // Checkbox filters
      for (const [paramKey, filterId] of Object.entries(PARAM_KEY_MAP)) {
        const f = this.filters[filterId];
        if (!f || f.type !== 'checkbox') continue;
        const checked = [];
        const unchecked = [];
        f.checkboxes.forEach(cb => {
          if (cb.checked) checked.push(cb.value);
          else unchecked.push(cb.value);
        });
        if (unchecked.length === 0) continue;
        if (unchecked.length < checked.length) {
          params.set(paramKey, unchecked.map(v => '!' + v).join(','));
        } else {
          params.set(paramKey, checked.join(','));
        }
      }

      // Panel open state
      const body = document.getElementById('filter-body');
      if (body.classList.contains('open')) params.set('panel', '1');

      // Subsection expand state
      const expandedSubs = [];
      for (const [filterId, f] of Object.entries(this.filters)) {
        if (f.type !== 'checkbox' || !f.name) continue;
        const list = f.group.querySelector('.filter-checkbox-list');
        if (list && !list.classList.contains('collapsed')) expandedSubs.push(f.name);
      }
      if (expandedSubs.length > 0) params.set('expanded', expandedSubs.join(','));

      const qs = params.toString();
      history.replaceState(null, '', qs ? '?' + qs : location.pathname);
    }

    restoreFromURL() {
      const params = new URLSearchParams(location.search);
      if (params.size === 0) return;

      // Colormap
      const cm = params.get('cm');
      if (cm) {
        const colorSelector = this.datamap.colorSelector;
        if (colorSelector && colorSelector.colorMaps) {
          const match = colorSelector.colorMaps.find(m => m.field === cm);
          if (match) colorSelector.handleColorMapSelection(match);
        }
      }

      // Range filters
      for (const [paramKey, filterId] of Object.entries(PARAM_KEY_MAP)) {
        const f = this.filters[filterId];
        if (!f || f.type !== 'range') continue;
        const val = params.get(paramKey);
        if (!val) continue;
        const parts = val.split('-');
        if (parts.length < 2) continue;
        let lo, hi;
        if (parts.length === 2) {
          lo = parseInt(parts[0]); hi = parseInt(parts[1]);
        } else if (parts.length === 3 && parts[0] === '') {
          lo = parseInt('-' + parts[1]); hi = parseInt(parts[2]);
        } else {
          continue;
        }
        if (isNaN(lo) || isNaN(hi)) continue;
        f.minInput.value = lo;
        f.maxInput.value = hi;
        f.minInput.dispatchEvent(new Event('input'));
      }

      // Checkbox filters
      for (const [paramKey, filterId] of Object.entries(PARAM_KEY_MAP)) {
        const f = this.filters[filterId];
        if (!f || f.type !== 'checkbox') continue;
        const val = params.get(paramKey);
        if (!val) continue;
        const items = val.split(',');
        const isExclusion = items.length > 0 && items[0].startsWith('!');
        if (isExclusion) {
          const excluded = new Set(items.map(v => v.slice(1)));
          f.checkboxes.forEach(cb => { cb.checked = !excluded.has(cb.value); });
        } else {
          const included = new Set(items);
          f.checkboxes.forEach(cb => { cb.checked = included.has(cb.value); });
        }
        if (f.checkboxes.length > 0) {
          f.checkboxes[0].dispatchEvent(new Event('change'));
        }
      }

      // Subsection expand state
      const expanded = params.get('expanded');
      if (expanded) {
        const expandedNames = new Set(expanded.split(','));
        for (const [filterId, f] of Object.entries(this.filters)) {
          if (f.type !== 'checkbox' || !f.name) continue;
          if (expandedNames.has(f.name)) {
            const list = f.group.querySelector('.filter-checkbox-list');
            const arrow = f.group.querySelector('.filter-subsection-arrow');
            if (list) list.classList.remove('collapsed');
            if (arrow) arrow.classList.remove('collapsed');
          }
        }
      }

      // Panel open state
      if (params.get('panel') === '1') {
        const body = document.getElementById('filter-body');
        const container = document.getElementById('filter-container');
        const icon = document.getElementById('filter-toggle-icon');
        body.classList.add('open');
        container.classList.add('open');
        icon.innerHTML = '&#9662;';
        this.updateFilterBodyHeight();
      }
    }

    resetAll() {
      for (const [filterId, f] of Object.entries(this.filters)) {
        if (f.type === 'range') {
          f.minInput.value = f.min;
          f.maxInput.value = f.sliderMax;
          f.state.minVal = f.min;
          f.state.maxVal = f.sliderMax;
          f.minInput.dispatchEvent(new Event('input'));
        } else if (f.type === 'checkbox') {
          f.checkboxes.forEach(cb => { cb.checked = true; });
        }
        if (f.group) f.group.classList.remove('filter-group-active');
        this.datamap.removeSelection(filterId);
      }
      document.getElementById('filter-reset-inline').classList.remove('filter-reset-active');

      // Reset legend opacities
      for (const legend of Object.values(this.patchedLegends)) {
        legend.items.forEach(item => { item.style.opacity = 1; });
      }

      this.updateMatchCount();
      this.serializeState();
    }
  }

  // Monkey-patch highlightPoints to preserve original point radius settings
  // and to correctly dim all points when filters are active but match nothing.
  function patchHighlightPoints(datamap) {
    var origHighlight = datamap.highlightPoints.bind(datamap);
    datamap.highlightPoints = function(itemId) {
      var currentLayer = datamap.pointLayer;
      var realClone = currentLayer.clone.bind(currentLayer);
      currentLayer.clone = function(overrides) {
        overrides.radiusMinPixels = datamap.pointRadiusMinPixels;
        overrides.radiusMaxPixels = datamap.pointRadiusMaxPixels;
        return realClone(overrides);
      };
      origHighlight(itemId);
      currentLayer.clone = realClone;

      var mgr = datamap.dataSelectionManager;
      var hasActiveFilters = Object.keys(mgr.selectedIndicesByItem).length > 0;
      var selectedIndices = mgr.getSelectedIndices();

      if (hasActiveFilters && selectedIndices.size === 0) {
        datamap.selected.fill(-1.0);
        var idx = datamap.layers.indexOf(datamap.pointLayer);
        if (idx !== -1) {
          var corrected = datamap.pointLayer.clone({
            radiusMinPixels: datamap.pointRadiusMinPixels,
            radiusMaxPixels: datamap.pointRadiusMaxPixels,
          });
          datamap.layers[idx] = corrected;
          datamap.pointLayer = corrected;
          datamap.deckgl.setProps({ layers: [...datamap.layers] });
        }
      }
    };
  }

  // Wait for DataMapPlot to finish loading data
  window.addEventListener('datamapReady', function(e) {
    const { datamap, hoverData } = e.detail;
    patchHighlightPoints(datamap);
    const filterPanel = new FilterPanel(datamap, hoverData, FILTER_CONFIG);
    filterPanel.restoreFromURL();

    // Track search usage
    const searchInput = document.querySelector('#search-container input');
    if (searchInput) {
      searchInput.addEventListener('input', function() {
        const q = searchInput.value.trim();
        if (q) trackDebounced('Map Search', () => ({query: q}));
      });
    }
  });
})();
</script>
