,"user_facing":"Yes"},{"date":"2026-03-04","text":"Fixed `--setting-sources user` not blocking dynamically discovered project skills","category":"config","change_type":"bugfix","complexity":"moderate","user_facing":"Yes"},{"date":"2026-03-04","text":"Fixed duplicate CLAUDE.md, slash commands, agents, and rules when running from a worktree nested inside its main repo (e.g. `claude -w`)","category":"agents","change_type":"bugfix","complexity":"moderate","user_facing":"Yes"},{"date":"2026-03-04","text":"Fixed plugin Stop\/SessionEnd\/etc hooks not firing after any `\/plugin` operation","category":"plugins","change_type":"bugfix","complexity":"moderate","user_facing":"Yes"},{"date":"2026-03-04","text":"Fixed plugin hooks being silently dropped when two plugins use the same `${CLAUDE_PLUGIN_ROOT}\/...` command template","category":"plugins","change_type":"bugfix","complexity":"moderate","user_facing":"No"},{"date":"2026-03-04","text":"Fixed memory leak in long-running SDK\/CCR sessions where conversation messages were retained unnecessarily","category":"performance","change_type":"bugfix","complexity":"moderate","user_facing":"No"},{"date":"2026-03-04","text":"Fixed API 400 errors in forked agents (autocompact, summarization) when resuming sessions that were interrupted mid-tool-batch","category":"agents","change_type":"bugfix","complexity":"moderate","user_facing":"Yes"},{"date":"2026-03-04","text":"Fixed \"unexpected tool_use_id found in tool_result blocks\" error when resuming conversations that start with an orphaned tool result","category":"api","change_type":"bugfix","complexity":"moderate","user_facing":"Yes"},{"date":"2026-03-04","text":"Fixed teammates accidentally spawning nested teammates via the Agent tool's `name` parameter","category":"agents","change_type":"bugfix","complexity":"moderate","user_facing":"Yes"},{"date":"2026-03-04","text":"Fixed `CLAUDE_CODE_MAX_OUTPUT_TOKENS` being ignored during conversation compaction","category":"config","change_type":"bugfix","complexity":"minor","user_facing":"Yes"},{"date":"2026-03-04","text":"Fixed `\/compact` summary rendering as a user bubble in SDK consumers (Claude Code Remote web UI, VSCode extension)","category":"ide","change_type":"bugfix","complexity":"minor","user_facing":"Yes"},{"date":"2026-03-04","text":"Fixed voice space bar getting stuck after a failed voice activation (module loading race, cold GrowthBook)","category":"voice","change_type":"bugfix","complexity":"moderate","user_facing":"Yes"},{"date":"2026-03-04","text":"Fixed worktree file copy on Windows","category":"cli","change_type":"bugfix","complexity":"minor","user_facing":"Yes"},{"date":"2026-03-04","text":"Fixed global `.claude` folder detection on Windows","category":"config","change_type":"bugfix","complexity":"minor","user_facing":"Yes"},{"date":"2026-03-04","text":"Fixed symlink bypass where writing new files through a symlinked parent directory could escape the working directory in `acceptEdits` mode","category":"permissions","change_type":"bugfix","complexity":"major","user_facing":"Yes"},{"date":"2026-03-04","text":"Fixed sandbox prompting users to approve non-allowed domains when `allowManagedDomainsOnly` is enabled in managed settings \u2014 non-allowed domains are now blocked automatically with no bypass","category":"permissions","change_type":"bugfix","complexity":"major","user_facing":"Yes"},{"date":"2026-03-04","text":"Fixed interactive tools (e.g., `AskUserQuestion`) being silently auto-allowed when listed in a skill's allowed-tools, bypassing the permission prompt and running with empty answers","category":"performance","change_type":"bugfix","complexity":"moderate","user_facing":"Yes"},{"date":"2026-03-04","text":"Fixed multi-GB memory spike when committing with large untracked binary files in the working tree","category":"cli","change_type":"bugfix","complexity":"minor","user_facing":"Yes"},{"date":"2026-03-04","text":"Fixed Escape not interrupting a running turn when the input box has draft text. Use Up arrow to pull queued messages back for editing, or Ctrl+U to clear the input line.","category":"ide","change_type":"bugfix","complexity":"minor","user_facing":"Yes"},{"date":"2026-03-04","text":"Fixed Android app crash when running local slash commands (`\/voice`, `\/cost`) in Remote Control sessions","category":"performance","change_type":"bugfix","complexity":"moderate","user_facing":"No"},{"date":"2026-03-04","text":"Fixed a memory leak where old message array versions accumulated in React Compiler `memoCache` over long sessions","category":"performance","change_type":"bugfix","complexity":"moderate","user_facing":"No"},{"date":"2026-03-04","text":"Fixed a memory leak where REPL render scopes accumulated over long sessions (~35MB over 1000 turns)","category":"performance","change_type":"bugfix","complexity":"moderate","user_facing":"No"},{"date":"2026-03-04","text":"Fixed memory retention in in-process teammates where the parent's full conversation history was pinned for the teammate's lifetime, preventing GC after `\/clear` or auto-compact","category":"agents","change_type":"bugfix","complexity":"moderate","user_facing":"No"},{"date":"2026-03-04","text":"Fixed a memory leak in interactive mode where hook events could accumulate unboundedly during long sessions","category":"hooks","change_type":"bugfix","complexity":"moderate","user_facing":"No"},{"date":"2026-03-04","text":"Fixed hang when `--mcp-config` points to a corrupted file","category":"mcp","change_type":"bugfix","complexity":"minor","user_facing":"Yes"},{"date":"2026-03-04","text":"Fixed slow startup when many skills\/plugins are installed","category":"performance","change_type":"bugfix","complexity":"moderate","user_facing":"Yes"},{"date":"2026-03-04","text":"Fixed `cd <outside-dir> && <cmd>` permission prompt to surface the chained command instead of only showing \"Yes, allow reading from <dir>\/\"","category":"permissions","change_type":"bugfix","complexity":"minor","user_facing":"Yes"},{"date":"2026-03-04","text":"Fixed conditional `.claude\/rules\/*.md` files (with `paths:` frontmatter) and nested CLAUDE.md files not loading in print mode (`claude -p`)","category":"config","change_type":"bugfix","complexity":"minor","user_facing":"Yes"},{"date":"2026-03-04","text":"Fixed `\/clear` not fully clearing all session caches, reducing memory retention in long sessions","category":"cli","change_type":"bugfix","complexity":"moderate","user_facing":"Yes"},{"date":"2026-03-04","text":"Fixed terminal flicker caused by animated elements at the scrollback boundary","category":"cli","change_type":"bugfix","complexity":"minor","user_facing":"Yes"},{"date":"2026-03-04","text":"Fixed UI frame drops on macOS when using MCP servers with OAuth (regression from 2.1.x)","category":"mcp","change_type":"bugfix","complexity":"moderate","user_facing":"Yes"},{"date":"2026-03-04","text":"Fixed occasional frame stalls during typing caused by synchronous debug log flushes","category":"performance","change_type":"bugfix","complexity":"minor","user_facing":"Yes"},{"date":"2026-03-04","text":"Fixed `TeammateIdle` and `TaskCompleted` hooks to support `{\"continue\": false, \"stopReason\": \"...\"}` to stop the teammate, matching `Stop` hook behavior","category":"hooks","change_type":"bugfix","complexity":"moderate","user_facing":"Yes"},{"date":"2026-03-04","text":"Fixed `WorktreeCreate` and `WorktreeRemove` plugin hooks being silently ignored","category":"plugins","change_type":"bugfix","complexity":"minor","user_facing":"No"},{"date":"2026-03-04","text":"Fixed skill descriptions with colons (e.g., \"Triggers include: X, Y, Z\") failing to load from SKILL.md frontmatter","category":"config","change_type":"bugfix","complexity":"minor","user_facing":"Yes"},{"date":"2026-03-04","text":"Fixed project skills without a `description:` frontmatter field not appearing in Claude's available skills list","category":"agents","change_type":"bugfix","complexity":"minor","user_facing":"Yes"},{"date":"2026-03-04","text":"Fixed `\/context` showing identical token counts for all MCP tools from a server","category":"mcp","change_type":"bugfix","complexity":"minor","user_facing":"Yes"},{"date":"2026-03-04","text":"Fixed literal `nul` file creation on Windows when the model uses CMD-style `2>nul` redirection in Git Bash","category":"cli","change_type":"bugfix","complexity":"minor","user_facing":"Yes"},{"date":"2026-03-04","text":"Fixed extra blank lines appearing below each tool call in the expanded subagent transcript view (Ctrl+O)","category":"agents","change_type":"bugfix","complexity":"minor","user_facing":"Yes"},{"date":"2026-03-04","text":"Fixed Tab\/arrow keys not cycling Settings tabs when `\/config` search box is focused but empty","category":"cli","change_type":"bugfix","complexity":"minor","user_facing":"Yes"},{"date":"2026-03-04","text":"Fixed service key OAuth sessions (CCR containers) spamming `[ERROR]` logs with 403s from profile-scoped endpoints","category":"auth","change_type":"bugfix","complexity":"minor","user_facing":"No"},{"date":"2026-03-04","text":"Fixed inconsistent color for \"Remote Control active\" status indicator","category":"cli","change_type":"bugfix","complexity":"minor","user_facing":"Yes"},{"date":"2026-03-04","text":"Fixed Voice waveform cursor covering the first suffix letter when dictating mid-input","category":"voice","change_type":"bugfix","complexity":"minor","user_facing":"Yes"},{"date":"2026-03-04","text":"Fixed Voice input showing all 5 spaces during warmup instead of capping at ~2 (aligning with the \"keep holding\u2026\" hint)","category":"voice","change_type":"bugfix","complexity":"minor","user_facing":"Yes"},{"date":"2026-03-04","text":"Improved spinner performance by isolating the 50ms animation loop from the surrounding shell, reducing render and CPU overhead during turns","category":"performance","change_type":"improvement","complexity":"moderate","user_facing":"Yes"},{"date":"2026-03-04","text":"Improved UI rendering performance in native binaries with React Compiler","category":"performance","change_type":"improvement","complexity":"moderate","user_facing":"Yes"},{"date":"2026-03-04","text":"Improved `--worktree` startup by eliminating a git subprocess on the startup path","category":"performance","change_type":"improvement","complexity":"minor","user_facing":"Yes"},{"date":"2026-03-04","text":"Improved macOS startup by eliminating redundant settings-file reloads when managed settings resolve","category":"performance","change_type":"improvement","complexity":"minor","user_facing":"Yes"},{"date":"2026-03-04","text":"Improved macOS startup for Claude.ai enterprise\/team users by skipping an unnecessary keychain lookup","category":"performance","change_type":"improvement","complexity":"minor","user_facing":"Yes"},{"date":"2026-03-04","text":"Improved MCP `-p` startup by pipelining claude.ai config fetch with local connections and using a concurrency pool instead of sequential batching","category":"mcp","change_type":"improvement","complexity":"moderate","user_facing":"Yes"},{"date":"2026-03-04","text":"Improved voice startup by removing imperceptible warmup pulse animations that were causing re-render stutter","category":"voice","change_type":"improvement","complexity":"minor","user_facing":"Yes"},{"date":"2026-03-04","text":"Improved MCP binary content handling: tools returning PDFs, Office documents, or audio now save decoded bytes to disk with the correct file extension instead of dumping raw base64 into the conversation context. WebFetch also saves binary responses alongside its summary.","category":"mcp","change_type":"improvement","complexity":"moderate","user_facing":"Yes"},{"date":"2026-03-04","text":"Improved memory usage in long sessions by stabilizing `onSubmit` across message updates","category":"performance","change_type":"improvement","complexity":"minor","user_facing":"No"},{"date":"2026-03-04","text":"Improved LSP tool rendering and memory context building to no longer read entire files","category":"performance","change_type":"improvement","complexity":"moderate","user_facing":"No"},{"date":"2026-03-04","text":"Improved session upload and memory sync to avoid reading large files into memory before size\/binary checks","category":"performance","change_type":"improvement","complexity":"moderate","user_facing":"No"},{"date":"2026-03-04","text":"Improved file operation performance by avoiding reading file contents for existence checks (6 sites)","category":"performance","change_type":"improvement","complexity":"minor","user_facing":"No"},{"date":"2026-03-04","text":"Improved documentation to clarify that `--append-system-prompt-file` and `--system-prompt-file` work in interactive mode (the docs previously said print mode only)","category":"config","change_type":"improvement","complexity":"minor","user_facing":"Yes"},{"date":"2026-03-04","text":"Reduced baseline memory by ~16MB by deferring Yoga WASM preloading","category":"performance","change_type":"improvement","complexity":"minor","user_facing":"No"},{"date":"2026-03-04","text":"Reduced memory footprint for SDK and CCR sessions using stream-json output","category":"performance","change_type":"improvement","complexity":"minor","user_facing":"No"},{"date":"2026-03-04","text":"Reduced memory usage when resuming large sessions (including compacted history)","category":"performance","change_type":"improvement","complexity":"minor","user_facing":"No"},{"date":"2026-03-04","text":"Reduced token usage on multi-agent tasks with more concise subagent final reports","category":"agents","change_type":"improvement","complexity":"minor","user_facing":"Yes"},{"date":"2026-03-04","text":"Changed Sonnet 4.5 users on Pro\/Max\/Team Premium to be automatically migrated to Sonnet 4.6","category":"auth","change_type":"feature","complexity":"moderate","user_facing":"Yes"},{"date":"2026-03-04","text":"Changed the `\/resume` picker to show your most recent prompt instead of the first one. This also resolves some titles appearing as `(session)`.","category":"cli","change_type":"improvement","complexity":"minor","user_facing":"Yes"},{"date":"2026-03-04","text":"Changed claude.ai MCP connector failures to show a notification instead of silently disappearing from the tool list","category":"mcp","change_type":"improvement","complexity":"minor","user_facing":"Yes"},{"date":"2026-03-04","text":"Changed example command suggestions to be generated deterministically instead of calling Haiku","category":"cli","change_type":"improvement","complexity":"minor","user_facing":"No"},{"date":"2026-03-04","text":"Changed resuming after compaction to no longer produce a preamble recap before continuing","category":"cli","change_type":"improvement","complexity":"minor","user_facing":"Yes"},{"date":"2026-03-04","text":"[SDK] Changed task creation to no longer require the `activeForm` field \u2014 the spinner falls back to the task subject","category":"api","change_type":"improvement","complexity":"minor","user_facing":"No"},{"date":"2026-03-04","text":"[VSCode] Added compaction display as a collapsible \"Compacted chat\" card with the summary inside","category":"ide","change_type":"feature","complexity":"minor","user_facing":"Yes"},{"date":"2026-03-04","text":"[VSCode] The permission mode picker now respects `permissions.disableBypassPermissionsMode` from your effective Claude Code settings (including managed\/policy settings) \u2014 when set to `disable`, bypass permissions mode is hidden from the picker","category":"ide","change_type":"improvement","complexity":"minor","user_facing":"Yes"},{"date":"2026-03-04","text":"[VSCode] Fixed RTL text (Arabic, Hebrew, Persian) rendering reversed in the chat panel (regression in v2.1.63)","category":"ide","change_type":"bugfix","complexity":"minor","user_facing":"Yes"},{"date":"2026-03-06","text":"Fixed API 400 errors when using `ANTHROPIC_BASE_URL` with a third-party gateway \u2014 tool search now correctly detects proxy endpoints and disables `tool_reference` blocks","category":"api","change_type":"bugfix","complexity":"moderate","user_facing":"Yes"},{"date":"2026-03-06","text":"Fixed `API Error: 400 This model does not support the effort parameter` when using custom Bedrock inference profiles or other model identifiers not matching standard Claude naming patterns","category":"api","change_type":"bugfix","complexity":"minor","user_facing":"Yes"},{"date":"2026-03-06","text":"Fixed empty model responses immediately after `ToolSearch` \u2014 the server renders tool schemas with system-prompt-style tags at the prompt tail, which could confuse models into stopping early","category":"mcp","change_type":"bugfix","complexity":"moderate","user_facing":"Yes"},{"date":"2026-03-06","text":"Fixed prompt-cache bust when an MCP server with `instructions` connects after the first turn","category":"mcp","change_type":"bugfix","complexity":"minor","user_facing":"No"},{"date":"2026-03-06","text":"Fixed Enter inserting a newline instead of submitting when typing over a slow SSH connection","category":"cli","change_type":"bugfix","complexity":"minor","user_facing":"Yes"},{"date":"2026-03-06","text":"Fixed clipboard corrupting non-ASCII text (CJK, emoji) on Windows\/WSL by using PowerShell `Set-Clipboard`","category":"cli","change_type":"bugfix","complexity":"minor","user_facing":"Yes"},{"date":"2026-03-06","text":"Fixed extra VS Code windows opening at startup on Windows when running from the VS Code integrated terminal","category":"ide","change_type":"bugfix","complexity":"minor","user_facing":"Yes"},{"date":"2026-03-06","text":"Fixed voice mode failing on Windows native binary with \"native audio module could not be loaded\"","category":"voice","change_type":"bugfix","complexity":"minor","user_facing":"Yes"},{"date":"2026-03-06","text":"Fixed push-to-talk not activating on session start when `voiceEnabled: true` was set in settings","category":"voice","change_type":"bugfix","complexity":"minor","user_facing":"Yes"},{"date":"2026-03-06","text":"Fixed markdown links containing `#NNN` references incorrectly pointing to the current repository instead of the linked URL","category":"cli","change_type":"bugfix","complexity":"minor","user_facing":"Yes"},{"date":"2026-03-06","text":"Fixed repeated \"Model updated to Opus 4.6\" notification when a project's `.claude\/settings.json` has a legacy Opus model string pinned","category":"config","change_type":"bugfix","complexity":"minor","user_facing":"Yes"},{"date":"2026-03-06","text":"Fixed plugins showing as inaccurately installed in `\/plugin`","category":"plugins","change_type":"bugfix","complexity":"minor","user_facing":"Yes"},{"date":"2026-03-06","text":"Fixed plugins showing \"not found in marketplace\" errors on fresh startup by auto-refreshing after marketplace installation","category":"plugins","change_type":"bugfix","complexity":"minor","user_facing":"Yes"},{"date":"2026-03-06","text":"Fixed `\/security-review` command failing with `unknown option merge-base` on older git versions","category":"cli","change_type":"bugfix","complexity":"minor","user_facing":"Yes"},{"date":"2026-03-06","text":"Fixed `\/color` command having no way to reset back to the default color \u2014 `\/color default`, `\/color gray`, `\/color reset`, and `\/color none` now restore the default","category":"cli","change_type":"bugfix","complexity":"minor","user_facing":"Yes"},{"date":"2026-03-06","text":"Fixed a performance regression in the `AskUserQuestion` preview dialog that re-ran markdown rendering on every keystroke in the notes input","category":"performance","change_type":"bugfix","complexity":"minor","user_facing":"Yes"},{"date":"2026-03-06","text":"Fixed feature flags read during early startup never refreshing their disk cache, causing stale values to persist across sessions","category":"config","change_type":"bugfix","complexity":"moderate","user_facing":"No"},{"date":"2026-03-06","text":"Fixed `permissions.defaultMode` settings values other than `acceptEdits` or `plan` being applied in Claude Code Remote environments \u2014 they are now ignored","category":"permissions","change_type":"bugfix","complexity":"minor","user_facing":"No"},{"date":"2026-03-06","text":"Fixed skill listing being re-injected on every `--resume` (~600 tokens saved per resume)","category":"performance","change_type":"bugfix","complexity":"minor","user_facing":"No"},{"date":"2026-03-06","text":"Fixed teleport marker not rendering in VS Code teleported sessions","category":"ide","change_type":"bugfix","complexity":"minor","user_facing":"Yes"},{"date":"2026-03-06","text":"Improved error message when microphone captures silence to distinguish from \"no speech detected\"","category":"voice","change_type":"improvement","complexity":"minor","user_facing":"Yes"},{"date":"2026-03-06","text":"Improved compaction to preserve images in the summarizer request, allowing prompt cache reuse for faster and cheaper compaction","category":"performance","change_type":"improvement","complexity":"moderate","user_facing":"No"},{"date":"2026-03-06","text":"Improved `\/rename` to work while Claude is processing, instead of being silently queued","category":"cli","change_type":"improvement","complexity":"minor","user_facing":"Yes"},{"date":"2026-03-06","text":"Reduced prompt input re-renders during turns by ~74%","category":"performance","change_type":"improvement","complexity":"minor","user_facing":"No"},{"date":"2026-03-06","text":"Reduced startup memory by ~426KB for users without custom CA certificates","category":"performance","change_type":"improvement","complexity":"minor","user_facing":"No"},{"date":"2026-03-06","text":"Reduced Remote Control `\/poll` rate to once per 10 minutes while connected (was 1\u20132s), cutting server load ~300\u00d7. Reconnection is unaffected \u2014 transport loss immediately wakes fast polling.","category":"performance","change_type":"improvement","complexity":"moderate","user_facing":"No"},{"date":"2026-03-06","text":"[VSCode] Added spark icon in VS Code activity bar that lists all Claude Code sessions, with sessions opening as full editors","category":"ide","change_type":"feature","complexity":"moderate","user_facing":"Yes"},{"date":"2026-03-06","text":"[VSCode] Added full markdown document view for plans in VS Code, with support for adding comments to provide feedback","category":"ide","change_type":"feature","complexity":"moderate","user_facing":"Yes"},{"date":"2026-03-06","text":"[VSCode] Added native MCP server management dialog \u2014 use `\/mcp` in the chat panel to enable\/disable servers, reconnect, and manage OAuth authentication without switching to the terminal","category":"mcp","change_type":"feature","complexity":"moderate","user_facing":"Yes"},{"date":"2026-03-06","text":"Added `\/loop` command to run a prompt or slash command on a recurring interval (e.g. `\/loop 5m check the deploy`)","category":"cli","change_type":"feature","complexity":"moderate","user_facing":"Yes"},{"date":"2026-03-06","text":"Added cron scheduling tools for recurring prompts within a session","category":"agents","change_type":"feature","complexity":"moderate","user_facing":"Yes"},{"date":"2026-03-06","text":"Added `voice:pushToTalk` keybinding to make the voice activation key rebindable in `keybindings.json` (default: space) \u2014 modifier+letter combos like `meta+k` have zero typing interference","category":"voice","change_type":"feature","complexity":"minor","user_facing":"Yes"},{"date":"2026-03-06","text":"Added `fmt`, `comm`, `cmp`, `numfmt`, `expr`, `test`, `printf`, `getconf`, `seq`, `tsort`, and `pr` to the bash auto-approval allowlist","category":"permissions","change_type":"improvement","complexity":"minor","user_facing":"Yes"},{"date":"2026-03-06","text":"Fixed stdin freeze in long-running sessions where keystrokes stop being processed but the process stays alive","category":"cli","change_type":"bugfix","complexity":"moderate","user_facing":"Yes"},{"date":"2026-03-06","text":"Fixed a 5\u20138 second startup freeze for users with voice mode enabled, caused by CoreAudio initialization blocking the main thread after system wake","category":"voice","change_type":"bugfix","complexity":"major","user_facing":"Yes"},{"date":"2026-03-06","text":"Fixed startup UI freeze when many claude.ai proxy connectors refresh an expired OAuth token simultaneously","category":"auth","change_type":"bugfix","complexity":"moderate","user_facing":"Yes"},{"date":"2026-03-06","text":"Fixed forked conversations (`\/fork`) sharing the same plan file, which caused plan edits in one fork to overwrite the other","category":"cli","change_type":"bugfix","complexity":"moderate","user_facing":"Yes"},{"date":"2026-03-06","text":"Fixed the Read tool putting oversized images into context when image processing failed, breaking subsequent turns in long image-heavy sessions","category":"cli","change_type":"bugfix","complexity":"moderate","user_facing":"Yes"},{"date":"2026-03-06","text":"Fixed false-positive permission prompts for compound bash commands containing heredoc commit messages","category":"permissions","change_type":"bugfix","complexity":"minor","user_facing":"Yes"},{"date":"2026-03-06","text":"Fixed plugin installations being lost when running multiple Claude Code instances","category":"plugins","change_type":"bugfix","complexity":"moderate","user_facing":"Yes"},{"date":"2026-03-06","text":"Fixed claude.ai connectors failing to reconnect after OAuth token refresh","category":"mcp","change_type":"bugfix","complexity":"moderate","user_facing":"Yes"},{"date":"2026-03-06","text":"Fixed claude.ai MCP connector startup notifications appearing for every org-configured connector instead of only previously connected ones","category":"mcp","change_type":"bugfix","complexity":"minor","user_facing":"Yes"},{"date":"2026-03-06","text":"Fixed background agent completion notifications missing the output file path, which made it difficult for parent agents to recover agent results after context compaction","category":"agents","change_type":"bugfix","complexity":"moderate","user_facing":"Yes"},{"date":"2026-03-06","text":"Fixed duplicate output in Bash tool error messages when commands exit with non-zero status","category":"cli","change_type":"bugfix","complexity":"minor","user_facing":"Yes"},{"date":"2026-03-06","text":"Fixed Chrome extension auto-detection getting permanently stuck on \"not installed\" after running on a machine without local Chrome","category":"ide","change_type":"bugfix","complexity":"moderate","user_facing":"Yes"},{"date":"2026-03-06","text":"Fixed `\/plugin marketplace update` failing with merge conflicts when the marketplace is pinned to a branch\/tag ref","category":"plugins","change_type":"bugfix","complexity":"moderate","user_facing":"Yes"},{"date":"2026-03-06","text":"Fixed `\/plugin marketplace add owner\/repo@ref` incorrectly parsing `@` \u2014 previously only `#` worked as a ref separator, causing undiagnosable errors with `strictKnownMarketplaces`","category":"plugins","change_type":"bugfix","complexity":"minor","user_facing":"Yes"},{"date":"2026-03-06","text":"Fixed duplicate entries in `\/permissions` Workspace tab when the same directory is added with and without a trailing slash","category":"permissions","change_type":"bugfix","complexity":"minor","user_facing":"Yes"},{"date":"2026-03-06","text":"Fixed `--print` hanging forever when team agents are configured \u2014 the exit loop no longer waits on long-lived `in_process_teammate` tasks","category":"agents","change_type":"bugfix","complexity":"moderate","user_facing":"Yes"},{"date":"2026-03-06","text":"Fixed \"\u276f Tool loaded.\" appearing in the REPL after every `ToolSearch` call","category":"cli","change_type":"bugfix","complexity":"minor","user_facing":"Yes"},{"date":"2026-03-06","text":"Fixed prompting for `cd <cwd> && git ...` on Windows when the model uses a mingw-style path","category":"cli","change_type":"bugfix","complexity":"minor","user_facing":"Yes"},{"date":"2026-03-06","text":"Improved startup time by deferring native image processor loading to first use","category":"performance","change_type":"improvement","complexity":"moderate","user_facing":"Yes"},{"date":"2026-03-06","text":"Improved bridge session reconnection to complete within seconds after laptop wake from sleep, instead of waiting up to 10 minutes","category":"performance","change_type":"improvement","complexity":"moderate","user_facing":"Yes"},{"date":"2026-03-06","text":"Improved `\/plugin uninstall` to disable project-scoped plugins in `.claude\/settings.local.json` instead of modifying `.claude\/settings.json`, so changes don't affect teammates","category":"plugins","change_type":"improvement","complexity":"moderate","user_facing":"Yes"},{"date":"2026-03-06","text":"Improved plugin-provided MCP server deduplication \u2014 servers that duplicate a manually-configured server (same command\/URL) are now skipped, preventing duplicate connections and tool sets. Suppressions are shown in the `\/plugin` menu.","category":"mcp","change_type":"improvement","complexity":"moderate","user_facing":"Yes"},{"date":"2026-03-06","text":"Updated `\/debug` to toggle debug logging on mid-session, since debug logs are no longer written by default","category":"cli","change_type":"improvement","complexity":"minor","user_facing":"Yes"},{"date":"2026-03-06","text":"Removed startup notification noise for unauthenticated org-registered claude.ai connectors","category":"auth","change_type":"improvement","complexity":"minor","user_facing":"Yes"},{"date":"2026-03-09","text":"Fixed tool search to activate even with `ANTHROPIC_BASE_URL` as long as `ENABLE_TOOL_SEARCH` is set.","category":"mcp","change_type":"bugfix","complexity":"minor","user_facing":"Yes"},{"date":"2026-03-09","text":"Added `w` key in `\/copy` to write the focused selection directly to a file, bypassing the clipboard (useful over SSH)","category":"cli","change_type":"feature","complexity":"minor","user_facing":"Yes"},{"date":"2026-03-09","text":"Added optional description argument to `\/plan` (e.g., `\/plan fix the auth bug`) that enters plan mode and immediately starts","category":"cli","change_type":"feature","complexity":"minor","user_facing":"Yes"},{"date":"2026-03-09","text":"Added `ExitWorktree` tool to leave an `EnterWorktree` session","category":"agents","change_type":"feature","complexity":"minor","user_facing":"Yes"},{"date":"2026-03-09","text":"Added `CLAUDE_CODE_DISABLE_CRON` environment variable to immediately stop scheduled cron jobs mid-session","category":"config","change_type":"feature","complexity":"minor","user_facing":"No"},{"date":"2026-03-09","text":"Added `lsof`, `pgrep`, `tput`, `ss`, `fd`, and `fdfind` to the bash auto-approval allowlist, reducing permission prompts for common read-only operations","category":"permissions","change_type":"improvement","complexity":"minor","user_facing":"Yes"},{"date":"2026-03-09","text":"Restored the `model` parameter on the Agent tool for per-invocation model overrides","category":"agents","change_type":"feature","complexity":"minor","user_facing":"Yes"},{"date":"2026-03-09","text":"Simplified effort levels to low\/medium\/high (removed max) with new symbols (\u25cb \u25d0 \u25cf) and a brief notification instead of a persistent icon. Use `\/effort auto` to reset to default","category":"cli","change_type":"improvement","complexity":"moderate","user_facing":"Yes"},{"date":"2026-03-09","text":"Improved `\/config` \u2014 Escape now cancels changes, Enter saves and closes, Space toggles settings","category":"config","change_type":"improvement","complexity":"minor","user_facing":"Yes"},{"date":"2026-03-09","text":"Improved up-arrow history to show current session's messages first when running multiple concurrent sessions","category":"cli","change_type":"improvement","complexity":"minor","user_facing":"Yes"},{"date":"2026-03-09","text":"Improved voice input transcription accuracy for repo names and common dev terms (regex, OAuth, JSON)","category":"voice","change_type":"improvement","complexity":"minor","user_facing":"Yes"},{"date":"2026-03-09","text":"Improved bash command parsing by switching to a native module \u2014 faster initialization and no memory leak","category":"cli","change_type":"improvement","complexity":"moderate","user_facing":"Yes"},{"date":"2026-03-09","text":"Reduced bundle size by ~510 KB","category":"performance","change_type":"improvement","complexity":"minor","user_facing":"Yes"},{"date":"2026-03-09","text":"Changed CLAUDE.md HTML comments (`<!-- ... -->`) to be hidden from Claude when auto-injected. Comments remain visible when read with the Read tool","category":"mcp","change_type":"improvement","complexity":"minor","user_facing":"Yes"},{"date":"2026-03-09","text":"Fixed slow exits when background tasks or hooks were slow to respond","category":"agents","change_type":"bugfix","complexity":"moderate","user_facing":"Yes"},{"date":"2026-03-09","text":"Fixed agent task progress stuck on \"Initializing\u2026\"","category":"agents","change_type":"bugfix","complexity":"moderate","user_facing":"Yes"},{"date":"2026-03-09","text":"Fixed skill hooks firing twice per event when a hooks-enabled skill is invoked by the model","category":"hooks","change_type":"bugfix","complexity":"moderate","user_facing":"Yes"},{"date":"2026-03-09","text":"Fixed several voice mode issues: occasional input lag, false \"No speech detected\" errors after releasing push-to-talk, and stale transcripts re-filling the prompt after submission","category":"voice","change_type":"bugfix","complexity":"major","user_facing":"Yes"},{"date":"2026-03-09","text":"Fixed `--continue` not resuming from the most recent point after `--compact`","category":"cli","change_type":"bugfix","complexity":"moderate","user_facing":"Yes"},{"date":"2026-03-09","text":"Fixed bash security parsing edge cases","category":"cli","change_type":"bugfix","complexity":"moderate","user_facing":"No"},{"date":"2026-03-09","text":"Added support for marketplace git URLs without `.git` suffix (Azure DevOps, AWS CodeCommit)","category":"plugins","change_type":"feature","complexity":"minor","user_facing":"Yes"},{"date":"2026-03-09","text":"Improved marketplace clone failure messages to show diagnostic info even when git produces no stderr","category":"plugins","change_type":"improvement","complexity":"minor","user_facing":"Yes"},{"date":"2026-03-09","text":"Fixed several plugin issues: installation failing on Windows with `EEXIST` error in OneDrive folders, marketplace blocking user-scope installs when a project-scope install exists, `CLAUDE_CODE_PLUGIN_CACHE_DIR` creating literal `~` directories, and `plugin.json` with marketplace-only fields failing to load","category":"plugins","change_type":"bugfix","complexity":"major","user_facing":"Yes"},{"date":"2026-03-09","text":"Fixed feedback survey appearing too frequently in long sessions","category":"cli","change_type":"bugfix","complexity":"minor","user_facing":"Yes"},{"date":"2026-03-09","text":"Fixed `--effort` CLI flag being reset by unrelated settings writes on startup","category":"config","change_type":"bugfix","complexity":"minor","user_facing":"Yes"},{"date":"2026-03-09","text":"Fixed backgrounded Ctrl+B queries losing their transcript or corrupting the new conversation after `\/clear`","category":"agents","change_type":"bugfix","complexity":"moderate","user_facing":"Yes"},{"date":"2026-03-09","text":"Fixed `\/clear` killing background agent\/bash tasks \u2014 only foreground tasks are now cleared","category":"agents","change_type":"bugfix","complexity":"moderate","user_facing":"Yes"},{"date":"2026-03-09","text":"Fixed worktree isolation issues: Task tool resume not restoring cwd, and background task notifications missing `worktreePath` and `worktreeBranch`","category":"agents","change_type":"bugfix","complexity":"moderate","user_facing":"Yes"},{"date":"2026-03-09","text":"Fixed `\/model` not displaying results when run while Claude is working","category":"cli","change_type":"bugfix","complexity":"minor","user_facing":"Yes"},{"date":"2026-03-09","text":"Fixed digit keys selecting menu options instead of typing in plan mode permission prompt's text input","category":"permissions","change_type":"bugfix","complexity":"minor","user_facing":"Yes"},{"date":"2026-03-09","text":"Fixed sandbox permission issues: certain file write operations incorrectly allowed without prompting, and output redirections to allowlisted directories (like `\/tmp\/claude\/`) prompting unnecessarily","category":"permissions","change_type":"bugfix","complexity":"moderate","user_facing":"Yes"},{"date":"2026-03-09","text":"Improved CPU utilization in long sessions","category":"performance","change_type":"improvement","complexity":"moderate","user_facing":"Yes"},{"date":"2026-03-09","text":"Fixed prompt cache invalidation in SDK `query()` calls, reducing input token costs up to 12x","category":"api","change_type":"bugfix","complexity":"moderate","user_facing":"Yes"},{"date":"2026-03-09","text":"Fixed Escape key becoming unresponsive after cancelling a query","category":"cli","change_type":"bugfix","complexity":"minor","user_facing":"Yes"},{"date":"2026-03-09","text":"Fixed double Ctrl+C not exiting when background agents or tasks are running","category":"cli","change_type":"bugfix","complexity":"minor","user_facing":"Yes"},{"date":"2026-03-09","text":"Fixed team agents to inherit the leader's model","category":"agents","change_type":"bugfix","complexity":"minor","user_facing":"Yes"},{"date":"2026-03-09","text":"Fixed \"Always Allow\" saving permission rules that never match again","category":"permissions","change_type":"bugfix","complexity":"moderate","user_facing":"Yes"},{"date":"2026-03-09","text":"Fixed several hooks issues: `transcript_path` pointing to the wrong directory for resumed\/forked sessions, agent `prompt` being silently deleted from settings.json on every settings write, PostToolUse block reason displaying twice, async hooks not receiving stdin with bash `read -r`, and validation error message showing an example that fails validation","category":"hooks","change_type":"bugfix","complexity":"major","user_facing":"Yes"},{"date":"2026-03-09","text":"Fixed session crashes in Desktop\/SDK when Read returned files containing U+2028\/U+2029 characters","category":"cli","change_type":"bugfix","complexity":"minor","user_facing":"Yes"},{"date":"2026-03-09","text":"Fixed terminal title being cleared on exit even when `CLAUDE_CODE_DISABLE_TERMINAL_TITLE` was set","category":"cli","change_type":"bugfix","complexity":"minor","user_facing":"Yes"},{"date":"2026-03-09","text":"Fixed several permission rule matching issues: wildcard rules not matching commands with heredocs, embedded newlines, or no arguments; `sandbox.excludedCommands` failing with env var prefixes; \"always allow\" suggesting overly broad prefixes for nested CLI tools; and deny rules not applying to all command forms","category":"permissions","change_type":"bugfix","complexity":"major","user_facing":"Yes"},{"date":"2026-03-09","text":"Fixed oversized and truncated images from Bash data-URL output","category":"cli","change_type":"bugfix","complexity":"minor","user_facing":"Yes"},{"date":"2026-03-09","text":"Fixed a crash when resuming sessions that contained Bedrock API errors","category":"api","change_type":"bugfix","complexity":"minor","user_facing":"Yes"},{"date":"2026-03-09","text":"Fixed intermittent \"expected boolean, received string\" validation errors on Edit, Bash, and Grep tool inputs","category":"cli","change_type":"bugfix","complexity":"minor","user_facing":"No"},{"date":"2026-03-09","text":"Fixed multi-line session titles when forking from a conversation whose first message contained newlines","category":"cli","change_type":"bugfix","complexity":"minor","user_facing":"Yes"},{"date":"2026-03-09","text":"Fixed queued messages not showing attached images, and images being lost when pressing \u2191 to edit a queued message","category":"cli","change_type":"bugfix","complexity":"minor","user_facing":"Yes"},{"date":"2026-03-09","text":"Fixed parallel tool calls where a failed Read\/WebFetch\/Glob would cancel its siblings \u2014 only Bash errors now cascade","category":"cli","change_type":"bugfix","complexity":"moderate","user_facing":"Yes"},{"date":"2026-03-09","text":"VSCode: Fixed scroll speed in integrated terminals not matching native terminals","category":"ide","change_type":"bugfix","complexity":"minor","user_facing":"Yes"},{"date":"2026-03-09","text":"VSCode: Fixed Shift+Enter submitting input instead of inserting a newline for users with older keybindings","category":"ide","change_type":"bugfix","complexity":"minor","user_facing":"Yes"},{"date":"2026-03-09","text":"VSCode: Added effort level indicator on the input border","category":"ide","change_type":"feature","complexity":"minor","user_facing":"Yes"},{"date":"2026-03-09","text":"VSCode: Added `vscode:\/\/anthropic.claude-code\/open` URI handler to open a new Claude Code tab programmatically, with optional `prompt` and `session` query parameters","category":"ide","change_type":"feature","complexity":"moderate","user_facing":"Yes"},{"date":"2026-03-11","text":"Added `modelOverrides` setting to map model picker entries to custom provider model IDs (e.g. Bedrock inference profile ARNs)","category":"config","change_type":"feature","complexity":"moderate","user_facing":"Yes"},{"date":"2026-03-11","text":"Added actionable guidance when OAuth login or connectivity checks fail due to SSL certificate errors (corporate proxies, `NODE_EXTRA_CA_CERTS`)","category":"auth","change_type":"improvement","complexity":"minor","user_facing":"Yes"},{"date":"2026-03-11","text":"Fixed freezes and 100% CPU loops triggered by permission prompts for complex bash commands","category":"permissions","change_type":"bugfix","complexity":"major","user_facing":"Yes"},{"date":"2026-03-11","text":"Fixed a deadlock that could freeze Claude Code when many skill files changed at once (e.g. during `git pull` in a repo with a large `.claude\/skills\/` directory)","category":"performance","change_type":"bugfix","complexity":"major","user_facing":"Yes"},{"date":"2026-03-11","text":"Fixed Bash tool output being lost when running multiple Claude Code sessions in the same project directory","category":"hooks","change_type":"bugfix","complexity":"moderate","user_facing":"Yes"},{"date":"2026-03-11","text":"Fixed subagents with `model: opus`\/`sonnet`\/`haiku` being silently downgraded to older model versions on Bedrock, Vertex, and Microsoft Foundry","category":"agents","change_type":"bugfix","complexity":"moderate","user_facing":"Yes"},{"date":"2026-03-11","text":"Fixed background bash processes spawned by subagents not being cleaned up when the agent exits","category":"agents","change_type":"bugfix","complexity":"moderate","user_facing":"Yes"},{"date":"2026-03-11","text":"Fixed `\/resume` showing the current session in the picker","category":"cli","change_type":"bugfix","complexity":"minor","user_facing":"Yes"},{"date":"2026-03-11","text":"Fixed `\/ide` crashing with `onInstall is not defined` when auto-installing the extension","category":"ide","change_type":"bugfix","complexity":"minor","user_facing":"Yes"},{"date":"2026-03-11","text":"Fixed `\/loop` not being available on Bedrock\/Vertex\/Foundry and when telemetry was disabled","category":"cli","change_type":"bugfix","complexity":"minor","user_facing":"Yes"},{"date":"2026-03-11","text":"Fixed SessionStart hooks firing twice when resuming a session via `--resume` or `--continue`","category":"hooks","change_type":"bugfix","complexity":"minor","user_facing":"No"},{"date":"2026-03-11","text":"Fixed JSON-output hooks injecting no-op system-reminder messages into the model's context on every turn","category":"hooks","change_type":"bugfix","complexity":"minor","user_facing":"No"},{"date":"2026-03-11","text":"Fixed voice mode session corruption when a slow connection overlaps a new recording","category":"voice","change_type":"bugfix","complexity":"moderate","user_facing":"Yes"},{"date":"2026-03-11","text":"Fixed Linux sandbox failing to start with \"ripgrep (rg) not found\" on native builds","category":"permissions","change_type":"bugfix","complexity":"moderate","user_facing":"Yes"},{"date":"2026-03-11","text":"Fixed Linux native modules not loading on Amazon Linux 2 and other glibc 2.26 systems","category":"performance","change_type":"bugfix","complexity":"moderate","user_facing":"Yes"},{"date":"2026-03-11","text":"Fixed \"media_type: Field required\" API error when receiving images via Remote Control","category":"mcp","change_type":"bugfix","complexity":"minor","user_facing":"Yes"},{"date":"2026-03-11","text":"Fixed `\/heapdump` failing on Windows with `EEXIST` error when the Desktop folder already exists","category":"cli","change_type":"bugfix","complexity":"minor","user_facing":"Yes"},{"date":"2026-03-11","text":"Improved Up arrow after interrupting Claude \u2014 now restores the interrupted prompt and rewinds the conversation in one step","category":"cli","change_type":"improvement","complexity":"moderate","user_facing":"Yes"},{"date":"2026-03-11","text":"Improved IDE detection speed at startup","category":"performance","change_type":"improvement","complexity":"minor","user_facing":"Yes"},{"date":"2026-03-11","text":"Improved clipboard image pasting performance on macOS","category":"performance","change_type":"improvement","complexity":"minor","user_facing":"Yes"},{"date":"2026-03-11","text":"Improved `\/effort` to work while Claude is responding, matching `\/model` behavior","category":"cli","change_type":"improvement","complexity":"minor","user_facing":"Yes"},{"date":"2026-03-11","text":"Improved voice mode to automatically retry transient connection failures during rapid push-to-talk re-press","category":"voice","change_type":"improvement","complexity":"moderate","user_facing":"Yes"},{"date":"2026-03-11","text":"Improved the Remote Control spawn mode selection prompt with better context","category":"agents","change_type":"improvement","complexity":"minor","user_facing":"Yes"},{"date":"2026-03-11","text":"Changed default Opus model on Bedrock, Vertex, and Microsoft Foundry to Opus 4.6 (was Opus 4.1)","category":"api","change_type":"improvement","complexity":"minor","user_facing":"Yes"},{"date":"2026-03-11","text":"Deprecated `\/output-style` command \u2014 use `\/config` instead. Output style is now fixed at session start for better prompt caching","category":"config","change_type":"breaking","complexity":"moderate","user_facing":"Yes"},{"date":"2026-03-11","text":"VSCode: Fixed HTTP 400 errors for users behind proxies or on Bedrock\/Vertex with Claude 4.5 models","category":"ide","change_type":"bugfix","complexity":"moderate","user_facing":"Yes"},{"date":"2026-03-11","text":"Added actionable suggestions to `\/context` command \u2014 identifies context-heavy tools, memory bloat, and capacity warnings with specific optimization tips","category":"cli","change_type":"feature","complexity":"moderate","user_facing":"Yes"},{"date":"2026-03-11","text":"Added `autoMemoryDirectory` setting to configure a custom directory for auto-memory storage","category":"config","change_type":"feature","complexity":"minor","user_facing":"Yes"},{"date":"2026-03-11","text":"Fixed memory leak where streaming API response buffers were not released when the generator was terminated early, causing unbounded RSS growth on the Node.js\/npm code path","category":"performance","change_type":"bugfix","complexity":"moderate","user_facing":"No"},{"date":"2026-03-11","text":"Fixed managed policy `ask` rules being bypassed by user `allow` rules or skill `allowed-tools`","category":"permissions","change_type":"bugfix","complexity":"moderate","user_facing":"Yes"},{"date":"2026-03-11","text":"Fixed full model IDs (e.g., `claude-opus-4-5`) being silently ignored in agent frontmatter `model:` field and `--agents` JSON config \u2014 agents now cli","change_type":"bugfix","complexity":"minor","user_facing":"Yes"},{"date":"2026-03-13","text":"Fixed footer hint in agent teams showing \"\u2193 to expand\" instead of the correct \"shift + \u2193 to expand\"","category":"cli","change_type":"bugfix","complexity":"minor","user_facing":"Yes"},{"date":"2026-03-13","text":"Improved startup performance on macOS non-MDM machines by skipping unnecessary subprocess spawns","category":"performance","change_type":"improvement","complexity":"moderate","user_facing":"Yes"},{"date":"2026-03-13","text":"Suppressed async hook completion messages by default (visible with `--verbose` or transcript mode)","category":"hooks","change_type":"improvement","complexity":"minor","user_facing":"Yes"},{"date":"2026-03-13","text":"Breaking change: Removed deprecated Windows managed settings fallback at `C:\\ProgramData\\ClaudeCode\\managed-settings.json` \u2014 use `C:\\Program Files\\ClaudeCode\\managed-settings.json`","category":"config","change_type":"breaking","complexity":"moderate","user_facing":"Yes"},{"date":"2026-03-14","text":"Added MCP elicitation support \u2014 MCP servers can now request structured input mid-task via an interactive dialog (form fields or browser URL)","category":"mcp","change_type":"feature","complexity":"major","user_facing":"Yes"},{"date":"2026-03-14","text":"Added new `Elicitation` and `ElicitationResult` hooks to intercept and override responses before they're sent back","category":"hooks","change_type":"feature","complexity":"moderate","user_facing":"No"},{"date":"2026-03-14","text":"Added `-n` \/ `--name <name>` CLI flag to set a display name for the session at startup","category":"cli","change_type":"feature","complexity":"minor","user_facing":"Yes"},{"date":"2026-03-14","text":"Added `worktree.sparsePaths` setting for `claude --worktree` in large monorepos to check out only the directories you need via git sparse-checkout","category":"config","change_type":"feature","complexity":"moderate","user_facing":"Yes"},{"date":"2026-03-14","text":"Added `PostCompact` hook that fires after compaction completes","category":"hooks","change_type":"feature","complexity":"minor","user_facing":"No"},{"date":"2026-03-14","text":"Added `\/effort` slash command to set model effort level","category":"cli","change_type":"feature","complexity":"minor","user_facing":"Yes"},{"date":"2026-03-14","text":"Added session quality survey \u2014 enterprise admins can configure the sample rate via the `feedbackSurveyRate` setting","category":"config","change_type":"feature","complexity":"minor","user_facing":"Yes"},{"date":"2026-03-14","text":"Fixed deferred tools (loaded via `ToolSearch`) losing their input schemas after conversation compaction, causing array and number parameters to be rejected with type errors","category":"mcp","change_type":"bugfix","complexity":"moderate","user_facing":"Yes"},{"date":"2026-03-14","text":"Fixed slash commands showing \"Unknown skill\"","category":"cli","change_type":"bugfix","complexity":"minor","user_facing":"Yes"},{"date":"2026-03-14","text":"Fixed plan mode asking for re-approval after the plan was already accepted","category":"cli","change_type":"bugfix","complexity":"minor","user_facing":"Yes"},{"date":"2026-03-14","text":"Fixed voice mode swallowing keypresses while a permission dialog or plan editor was open","category":"voice","change_type":"bugfix","complexity":"moderate","user_facing":"Yes"},{"date":"2026-03-14","text":"Fixed `\/voice` not working on Windows when installed via npm","category":"voice","change_type":"bugfix","complexity":"minor","user_facing":"Yes"},{"date":"2026-03-14","text":"Fixed spurious \"Context limit reached\" when invoking a skill with `model:` frontmatter on a 1M-context session","category":"api","change_type":"bugfix","complexity":"minor","user_facing":"Yes"},{"date":"2026-03-14","text":"Fixed \"adaptive thinking is not supported on this model\" error when using non-standard model strings","category":"api","change_type":"bugfix","complexity":"minor","user_facing":"Yes"},{"date":"2026-03-14","text":"Fixed `Bash(cmd:*)` permission rules not matching when a quoted argument contains `#`","category":"permissions","change_type":"bugfix","complexity":"minor","user_facing":"Yes"},{"date":"2026-03-14","text":"Fixed \"don't ask again\" in the Bash permission dialog showing the full raw command for pipes and compound commands","category":"permissions","change_type":"bugfix","complexity":"minor","user_facing":"Yes"},{"date":"2026-03-14","text":"Fixed auto-compaction retrying indefinitely after consecutive failures \u2014 a circuit breaker now stops after 3 attempts","category":"performance","change_type":"bugfix","complexity":"moderate","user_facing":"Yes"},{"date":"2026-03-14","text":"Fixed MCP reconnect spinner persisting after successful reconnection","category":"mcp","change_type":"bugfix","complexity":"minor","user_facing":"Yes"},{"date":"2026-03-14","text":"Fixed LSP plugins not registering servers when the LSP Manager initialized before marketplaces were reconciled","category":"plugins","change_type":"bugfix","complexity":"moderate","user_facing":"Yes"},{"date":"2026-03-14","text":"Fixed clipboard copying in tmux over SSH \u2014 now attempts both direct terminal write and tmux clipboard integration","category":"cli","change_type":"bugfix","complexity":"moderate","user_facing":"Yes"},{"date":"2026-03-14","text":"Fixed `\/export` showing only the filename instead of the full file path in the success message","category":"cli","change_type":"bugfix","complexity":"minor","user_facing":"Yes"},{"date":"2026-03-14","text":"Fixed transcript not auto-scrolling to new messages after selecting text","category":"cli","change_type":"bugfix","complexity":"minor","user_facing":"Yes"},{"date":"2026-03-14","text":"Fixed Escape key not working to exit the login method selection screen","category":"cli","change_type":"bugfix","complexity":"minor","user_facing":"Yes"},{"date":"2026-03-14","text":"Fixed several Remote Control issues: sessions silently dying when the server reaps an idle environment, rapid messages being queued one-at-a-time instead of batched, and stale work items causing redelivery after JWT refresh","category":"other","change_type":"bugfix","complexity":"major","user_facing":"Yes"},{"date":"2026-03-14","text":"Fixed bridge sessions failing to recover after extended WebSocket disconnects","category":"other","change_type":"bugfix","complexity":"moderate","user_facing":"Yes"},{"date":"2026-03-14","text":"Fixed slash commands not found when typing the exact name of a soft-hidden command","category":"cli","change_type":"bugfix","complexity":"minor","user_facing":"Yes"},{"date":"2026-03-14","text":"Improved `--worktree` startup performance by reading git refs directly and skipping redundant `git fetch` when the remote branch is already available locally","category":"agents","change_type":"improvement","complexity":"moderate","user_facing":"Yes"},{"date":"2026-03-14","text":"Improved background agent behavior \u2014 killing a background agent now preserves its partial results in the conversation context","category":"agents","change_type":"improvement","complexity":"moderate","user_facing":"Yes"},{"date":"2026-03-14","text":"Improved model fallback notifications \u2014 now always visible instead of hidden behind verbose mode, with human-friendly model names","category":"cli","change_type":"improvement","complexity":"minor","user_facing":"Yes"},{"date":"2026-03-14","text":"Improved blockquote readability on dark terminal themes \u2014 text is now italic with a left bar instead of dim","category":"cli","change_type":"improvement","complexity":"minor","user_facing":"Yes"},{"date":"2026-03-14","text":"Improved stale worktree cleanup \u2014 worktrees left behind after an interrupted parallel run are now automatically cleaned up","category":"agents","change_type":"improvement","complexity":"moderate","user_facing":"Yes"},{"date":"2026-03-14","text":"Improved Remote
