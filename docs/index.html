<script>
function minMaxFilterEditor(cell, onRendered, success, cancel) {
  var container = document.createElement("span");
  container.style.display = "flex";
  container.style.flexDirection = "column";
  container.style.gap = "1px";

  var from = document.createElement("input");
  from.type = "date";
  from.style.width = "100%";
  from.style.fontSize = "0.65rem";
  from.style.padding = "1px 2px";
  from.style.fontFamily = "IBM Plex Mono, monospace";

  var to = document.createElement("input");
  to.type = "date";
  to.style.width = "100%";
  to.style.fontSize = "0.65rem";
  to.style.padding = "1px 2px";
  to.style.fontFamily = "IBM Plex Mono, monospace";

  function update() {
    success({from: from.value, to: to.value});
  }
  from.addEventListener("change", update);
  to.addEventListener("change", update);

  var row = function(label, input) {
    var r = document.createElement("span");
    r.style.display = "flex";
    r.style.alignItems = "center";
    r.style.gap = "2px";
    var s = document.createElement("span");
    s.textContent = label;
    s.style.fontSize = "0.6rem";
    s.style.color = "#888";
    s.style.flexShrink = "0";
    r.appendChild(s);
    input.style.flex = "1";
    input.style.minWidth = "0";
    r.appendChild(input);
    return r;
  };
  container.appendChild(row("≥", from));
  container.appendChild(row("≤", to));

  return container;
}

function minMaxFilterFunction(headerValue, rowValue) {
  if (headerValue.from && rowValue < headerValue.from) return false;
  if (headerValue.to && rowValue > headerValue.to) return false;
  return true;
}

function updateKpis(rows) {
  var n = rows.length;
  if (n === 0) {
    document.getElementById("kpi-row").innerHTML = '<span class="kpi"><span class="kpi-label">Entries</span> <span class="kpi-value">0</span></span>';
    return;
  }
  var dates = rows.map(function(r) { return r.getData().date; }).filter(Boolean).sort();
  var cats = {};
  var bugfixes = 0;
  var userFacing = 0;
  rows.forEach(function(r) {
    var d = r.getData();
    cats[d.category] = (cats[d.category] || 0) + 1;
    if (d.change_type === "bugfix") bugfixes++;
    if (d.user_facing === "Yes") userFacing++;
  });
  var topCat = Object.keys(cats).sort(function(a, b) { return cats[b] - cats[a]; })[0];
  var minDate = new Date(dates[0]);
  var maxDate = new Date(dates[dates.length - 1]);
  var months = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
  var range = months[minDate.getMonth()] + " " + minDate.getDate() + ", " + minDate.getFullYear() + " – " + months[maxDate.getMonth()] + " " + maxDate.getDate() + ", " + maxDate.getFullYear();
  var bugPct = Math.round(bugfixes / n * 100) + "%";
  var ufPct = Math.round(userFacing / n * 100) + "%";
  var stats = [
    ["Entries", n.toLocaleString()],
    ["Range", range],
    ["Top Category", topCat],
    ["Bugfix %", bugPct],
    ["User-Facing %", ufPct],
  ];
  document.getElementById("kpi-row").innerHTML = stats.map(function(s) {
    return '<span class="kpi"><span class="kpi-label">' + s[0] + '</span> <span class="kpi-value">' + s[1] + '</span></span>';
  }).join(" &middot; ");
}

h git submodules not being fully initialized when installed","category":"plugins","change_type":"bugfix","complexity":"minor","user_facing":"Yes"},{"date":"2026-01-13","text":"Fixed bash commands failing on Windows when temp directory paths contained characters like `t` or `n` that were misinterpreted as escape sequences","category":"cli","change_type":"bugfix","complexity":"minor","user_facing":"Yes"},{"date":"2026-01-13","text":"Improved typing responsiveness by reducing memory allocation overhead in terminal rendering","category":"performance","change_type":"improvement","complexity":"minor","user_facing":"Yes"},{"date":"2026-01-13","text":"Enabled MCP tool search auto mode by default for all users. When MCP tool descriptions exceed 10% of the context window, they are automatically deferred and discovered via the MCPSearch tool instead of being loaded upfront. This reduces context usage for users with many MCP tools configured. Users can disable this by adding `MCPSearch` to `disallowedTools` in their settings.","category":"mcp","change_type":"feature","complexity":"moderate","user_facing":"Yes"},{"date":"2026-01-13","text":"Changed OAuth and API Console URLs from console.anthropic.com to platform.claude.com","category":"auth","change_type":"improvement","complexity":"minor","user_facing":"No"},{"date":"2026-01-13","text":"[VSCode] Fixed `claudeProcessWrapper` setting passing the wrapper path instead of the Claude binary path","category":"ide","change_type":"bugfix","complexity":"minor","user_facing":"Yes"},{"date":"2026-01-15","text":"Added `auto:N` syntax for configuring the MCP tool search auto-enable threshold, where N is the context window percentage (0-100)","category":"mcp","change_type":"feature","complexity":"moderate","user_facing":"Yes"},{"date":"2026-01-15","text":"Added `plansDirectory` setting to customize where plan files are stored","category":"config","change_type":"feature","complexity":"minor","user_facing":"Yes"},{"date":"2026-01-15","text":"Added external editor support (Ctrl+G) in AskUserQuestion \"Other\" input field","category":"cli","change_type":"feature","complexity":"minor","user_facing":"Yes"},{"date":"2026-01-15","text":"Added session URL attribution to commits and PRs created from web sessions","category":"mcp","change_type":"feature","complexity":"moderate","user_facing":"Yes"},{"date":"2026-01-15","text":"Added support for `PreToolUse` hooks to return `additionalContext` to the model","category":"hooks","change_type":"feature","complexity":"moderate","user_facing":"No"},{"date":"2026-01-15","text":"Added `${CLAUDE_SESSION_ID}` string substitution for skills to access the current session ID","category":"cli","change_type":"feature","complexity":"minor","user_facing":"No"},{"date":"2026-01-15","text":"Fixed long sessions with parallel tool calls failing with an API error about orphan tool_result blocks","category":"api","change_type":"bugfix","complexity":"major","user_facing":"Yes"},{"date":"2026-01-15","text":"Fixed MCP server reconnection hanging when cached connection promise never resolves","category":"mcp","change_type":"bugfix","complexity":"moderate","user_facing":"Yes"},{"date":"2026-01-15","text":"Fixed Ctrl+Z suspend not working in terminals using Kitty keyboard protocol (Ghostty, iTerm2, kitty, WezTerm)","category":"cli","change_type":"bugfix","complexity":"minor","user_facing":"Yes"},{"date":"2026-01-17","text":"Added new `Setup` hook event that can be triggered via `--init`, `--init-only`, or `--maintenance` CLI flags for repository setup and maintenance operations","category":"hooks","change_type":"feature","complexity":"moderate","user_facing":"Yes"},{"date":"2026-01-17","text":"Added keyboard shortcut 'c' to copy OAuth URL when browser doesn't open automatically during login","category":"auth","change_type":"feature","complexity":"minor","user_facing":"Yes"},{"date":"2026-01-17","text":"Fixed a crash when running bash commands containing heredocs with JavaScript template literals like `${index + 1}`","category":"cli","change_type":"bugfix","complexity":"moderate","user_facing":"Yes"},{"date":"2026-01-17","text":"Improved startup to capture keystrokes typed before the REPL is fully ready","category":"performance","change_type":"improvement","complexity":"moderate","user_facing":"Yes"},{"date":"2026-01-17","text":"Improved file suggestions to show as removable attachments instead of inserting text when accepted","category":"cli","change_type":"improvement","complexity":"minor","user_facing":"Yes"},{"date":"2026-01-17","text":"[VSCode] Added install count display to plugin listings","category":"ide","change_type":"feature","complexity":"minor","user_facing":"Yes"},{"date":"2026-01-17","text":"[VSCode] Added trust warning when installing plugins","category":"ide","change_type":"feature","complexity":"minor","user_facing":"Yes"},{"date":"2026-01-17","text":"Fixed excessive MCP connection requests for HTTP\/SSE transports","category":"mcp","change_type":"bugfix","complexity":"moderate","user_facing":"No"},{"date":"2026-01-17","text":"Fixed message rendering bug","category":"cli","change_type":"bugfix","complexity":"minor","user_facing":"Yes"},{"date":"2026-01-20","text":"Added history-based autocomplete in bash mode (`!`) - type a partial command and press Tab to complete from your bash command history","category":"cli","change_type":"feature","complexity":"minor","user_facing":"Yes"},{"date":"2026-01-20","text":"Added search to installed plugins list - type to filter by name or description","category":"plugins","change_type":"feature","complexity":"minor","user_facing":"Yes"},{"date":"2026-01-20","text":"Added support for pinning plugins to specific git commit SHAs, allowing marketplace entries to install exact versions","category":"plugins","change_type":"feature","complexity":"moderate","user_facing":"Yes"},{"date":"2026-01-20","text":"Fixed a regression where the context window blocking limit was calculated too aggressively, blocking users gins","change_type":"bugfix","complexity":"minor","user_facing":"Yes"},{"date":"2026-01-20","text":"Fixed iTerm2 progress bar not clearing properly on exit, preventing lingering indicators and bell sounds","category":"cli","change_type":"bugfix","complexity":"minor","user_facing":"Yes"},{"date":"2026-01-20","text":"Improved backspace to delete pasted text as a single token instead of one character at a time","category":"cli","change_type":"improvement","complexity":"minor","user_facing":"Yes"},{"date":"2026-01-20","text":"[VSCode] Added `\/usage` command to display current plan usage","category":"ide","change_type":"feature","complexity":"minor","user_facing":"Yes"},{"date":"2026-01-21","text":"Added deprecation notification for npm installations - run `claude install` or see https:\/\/docs.anthropic.com\/en\/docs\/claude-code\/getting-started for more options","category":"cli","change_type":"feature","complexity":"minor","user_facing":"Yes"},{"date":"2026-01-21","text":"Improved UI rendering performance with React Compiler","category":"performance","change_type":"improvement","complexity":"moderate","user_facing":"Yes"},{"date":"2026-01-21","text":"Fixed the \"Context left until auto-compact\" warning not disappearing after running `\/compact`","category":"cli","change_type":"bugfix","complexity":"minor","user_facing":"Yes"},{"date":"2026-01-21","text":"Fixed MCP stdio server timeout not killing child process, which could cause UI freezes","category":"mcp","change_type":"bugfix","complexity":"moderate","user_facing":"Yes"},{"date":"2026-01-22","text":"Added new task management system, including new capabilities like dependency tracking","category":"cli","change_type":"feature","complexity":"major","user_facing":"Yes"},{"date":"2026-01-22","text":"[VSCode] Added native plugin management support","category":"ide","change_type":"feature","complexity":"moderate","user_facing":"Yes"},{"date":"2026-01-22","text":"[VSCode] Added ability for OAuth users to browse and resume remote Claude sessions from the Sessions dialog","category":"ide","change_type":"feature","complexity":"moderate","user_facing":"Yes"},{"date":"2026-01-22","text":"Fixed out-of-memory crashes when resuming sessions with heavy subagent usage","category":"performance","change_type":"bugfix","complexity":"major","user_facing":"Yes"},{"date":"2026-01-22","text":"Fixed an issue where the \"context remaining\" warning was not hidden after running `\/compact`","category":"cli","change_type":"bugfix","complexity":"minor","user_facing":"Yes"},{"date":"2026-01-22","text":"Fixed session titles on the resume screen not respecting the user's language setting","category":"cli","change_type":"bugfix","complexity":"minor","user_facing":"Yes"},{"date":"2026-01-22","text":"[IDE] Fixed a race condition on Windows where the Claude Code sidebar view container would not appear on start","category":"ide","change_type":"bugfix","complexity":"moderate","user_facing":"Yes"},{"date":"2026-01-22","text":"Fixed crashes on processors without AVX instruction support","category":"performance","change_type":"bugfix","complexity":"major","user_facing":"Yes"},{"date":"2026-01-22","text":"Added customizable keyboard shortcuts. Configure keybindings per context, create chord sequences, and personalize your workflow. Run `\/keybindings` to get started. Learn more at https:\/\/code.claude.com\/docs\/en\/keybindings","category":"cli","change_type":"feature","complexity":"moderate","user_facing":"Yes"},{"date":"2026-01-23","text":"Added env var `CLAUDE_CODE_ENABLE_TASKS`, set to `false` to keep the old system temporarily","category":"config","change_type":"feature","complexity":"minor","user_facing":"Yes"},{"date":"2026-01-23","text":"Added shorthand `$0`, `$1`, etc. for accessing individual arguments in custom commands","category":"cli","change_type":"feature","complexity":"minor","user_facing":"Yes"},{"date":"2026-01-23","text":"Fixed crashes on processors without AVX instruction support","category":"p ","user_facing":"Yes"},{"date":"2026-01-30","text":"Fixed status bar duplicating background task indicator when PR status was shown","category":"ide","change_type":"bugfix","complexity":"minor","user_facing":"Yes"},{"date":"2026-01-30","text":"Windows: Fixed bash command execution failing for users with `.bashrc` files","category":"cli","change_type":"bugfix","complexity":"minor","user_facing":"Yes"},{"date":"2026-01-30","text":"Windows: Fixed console windows flashing when spawning child processes","category":"cli","change_type":"bugfix","complexity":"minor","user_facing":"No"},{"date":"2026-01-30","text":"VSCode: Fixed OAuth token expiration causing 401 errors after extended sessions","category":"ide","change_type":"bugfix","complexity":"moderate","user_facing":"Yes"},{"date":"2026-01-31","text":"Fixed startup performance issues when resuming sessions that have `saved_hook_context`","category":"performance","change_type":"bugfix","complexity":"moderate","user_facing":"Yes"},{"date":"2026-02-03","text":"Added `pages` parameter to the Read tool for PDFs, allowing specific page ranges to be read (e.g., `pages: \"1-5\"`). Large PDFs (>10 pages) now return a lightweight reference when `@` mentioned instead of being inlined into context.","category":"hooks","change_type":"feature","complexity":"major","user_facing":"Yes"},{"date":"2026-02-03","text":"Added pre-configured OAuth client credentials for MCP servers that don't support Dynamic Client Registration (e.g., Slack). Use `--client-id` and `--client-secret` with `claude mcp add`.","category":"mcp","change_type":"feature","complexity":"moderate","user_facing":"Yes"},{"date":"2026-02-03","text":"Added `\/debug` for Claude to help troubleshoot the current session","category":"cli","change_type":"feature","complexity":"moderate","user_facing":"Yes"},{"date":"2026-02-03","text":"Added support for additional `git log` and `git show` flags in read-only mode (e.g., `--topo-order`, `--cherry-pick`, `--format`, `--raw`)","cate es"},{"date":"2026-02-13","text":"Fixed \/resume showing interrupt messages as session titles","category":"cli","change_type":"bugfix","complexity":"minor","user_facing":"Yes"},{"date":"2026-02-13","text":"Fixed image dimension limit errors to suggest \/compact","category":"cli","change_type":"improvement","complexity":"minor","user_facing":"Yes"},{"date":"2026-02-16","text":"Fixed ENAMETOOLONG errors for deeply-nested directory paths","category":"cli","change_type":"bugfix","complexity":"minor","user_facing":"Yes"},{"date":"2026-02-16","text":"Fixed auth refresh errors","category":"auth","change_type":"bugfix","complexity":"moderate","user_facing":"Yes"},{"date":"2026-02-17","text":"Added support for Claude Sonnet 4.6","category":"api","change_type":"feature","complexity":"minor","user_facing":"Yes"},{"date":"2026-02-17","text":"Added support for reading `enabledPlugins` and `extraKnownMarketplaces` from `--add-dir` directories","category":"plugins","change_type":"feature","complexity":"moderate","user_facing":"Yes"},{"date":"2026-02-17","text":"Added `spinnerTipsOverride` setting to customize spinner tips \u2014 configure `tips` with an array of custom tip strings, and optionally set `excludeDefault: true` to show only your custom tips instead of the built-in ones","category":"config","change_type":"feature","complexity":"minor","user_facing":"Yes"},{"date":"2026-02-17","text":"Added `SDKRateLimitInfo` and `SDKRateLimitEvent` types to the SDK, enabling consumers to receive rate limit status updates including utilization, reset times, and overage information","category":"api","change_type":"feature","complexity":"moderate","user_facing":"No"},{"date":"2026-02-17","text":"Fixed Agent Teams teammates failing on Bedrock, Vertex, and Foundry by propagating API provider environment variables to tmux-spawned processes (anthropics\/claude-code#23561)","category":"agents","change_type":"bugfix","complexity":"moderate","user_facing":"Yes"},{"date":"2026-02-17","text":"Fixed i","change_type":"improvement","complexity":"minor","user_facing":"Yes"},{"date":"2026-02-17","text":"[VSCode] Improved permission destination choice (project\/user\/session) to persist across sessions","category":"ide","change_type":"improvement","complexity":"minor","user_facing":"Yes"},{"date":"2026-02-18","text":"Fixed FileWriteTool line counting to preserve intentional trailing blank lines instead of stripping them with `trimEnd()`.","category":"cli","change_type":"bugfix","complexity":"minor","user_facing":"Yes"},{"date":"2026-02-18","text":"Fixed Windows terminal rendering bugs caused by `os.EOL` (`\\r\\n`) in display code \u2014 line counts now show correct values instead of always showing 1 on Windows.","category":"cli","change_type":"bugfix","complexity":"minor","user_facing":"Yes"},{"date":"2026-02-18","text":"Improved VS Code plan preview: auto-updates as Claude iterates, enables commenting only when the plan is ready for review, and keeps the preview open when rejecting so Claude can revise.","category":"ide","change_type":"improvement","complexity":"moderate","user_facing":"Yes"},{"date":"2026-02-18","text":"Fixed a bug where bold and colored text in markdown output could shift to the wrong characters on Windows due to `\\r\\n` line endings.","category":"cli","change_type":"bugfix","complexity":"minor","user_facing":"Yes"},{"date":"2026-02-18","text":"Fixed compaction failing when conversation contains many PDF documents by stripping document blocks alongside images before sending to the compaction API (anthropics\/claude-code#26188)","category":"api","change_type":"bugfix","complexity":"moderate","user_facing":"Yes"},{"date":"2026-02-18","text":"Improved memory usage in long-running sessions by releasing API stream buffers, agent context, and skill state after use","category":"performance","change_type":"improvement","complexity":"moderate","user_facing":"Yes"},{"date":"2026-02-18","text":"Improved startup performance by deferring SessionStart hook execution, reducing time-to-interactive by ~500ms.","category":"performance","change_type":"improvement","complexity":"moderate","user_facing":"Yes"},{"date":"2026-02-18","text":"Fixed an issue where bash tool output was silently discarded on Windows when using MSYS2 or Cygwin shells.","category":"cli","change_type":"bugfix","complexity":"moderate","user_facing":"Yes"},{"date":"2026-02-18","text":"Improved performance of `@` file mentions - file suggestions now appear faster by pre-warming the index on startup and using session-based caching with background refresh.","category":"performance","change_type":"improvement","complexity":"moderate","user_facing":"Yes"},{"date":"2026-02-18","text":"Improved memory usage by trimming agent task message history after tasks complete","category":"performance","change_type":"improvement","complexity":"minor","user_facing":"Yes"},{"date":"2026-02-18","text":"Improved memory usage during long agent sessions by eliminating O(n\u00b2) message accumulation in progress updates","category":"performance","change_type":"improvement","complexity":"moderate","user_facing":"Yes"},{"date":"2026-02-18","text":"Fixed the bash permission classifier to validate that returned match descriptions correspond to actual input rules, preventing hallucinated descriptions from incorrectly granting permissions","category":"permissions","change_type":"bugfix","complexity":"moderate","user_facing":"Yes"},{"date":"2026-02-18","text":"Fixed user-defined agents only loading one file on NFS\/FUSE filesystems that report zero inodes (anthropics\/claude-code#26044)","category":"agents","change_type":"bugfix","complexity":"minor","user_facing":"Yes"},{"date":"2026-02-18","text":"Fixed plugin agent skills silently failing to load when referenced by bare name instead of fully-qualified plugin name (anthropics\/claude-code#25834)","category":"plugins","change_type":"bugfix","complexity":"minor","user_facing":"Yes"},{"date":"2026-02-18","text":"Search patterns in collap Yes"},{"date":"2026-02-18","text":"Fixed custom agent `model` field in `.claude\/agents\/*.md` being ignored when spawning team teammates (anthropics\/claude-code#26064)","category":"agents","change_type":"bugfix","complexity":"minor","user_facing":"Yes"},{"date":"2026-02-18","text":"Fixed plan mode being lost after context compaction, causing the model to switch from planning to implementation mode (anthropics\/claude-code#26061)","category":"agents","change_type":"bugfix","complexity":"moderate","user_facing":"Yes"},{"date":"2026-02-18","text":"Fixed `alwaysThinkingEnabled: true` in settings.json not enabling thinking mode on Bedrock and Vertex providers (anthropics\/claude-code#26074)","category":"api","change_type":"bugfix","complexity":"minor","user_facing":"Yes"},{"date":"2026-02-18","text":"Fixed `tool_decision` OTel telemetry event not being emitted in headless\/SDK mode (anthropics\/claude-code#26059)","category":"api","change_type":"bugfix","complexity":"minor","user_facing":"No"},{"date":"2026-02-18","text":"Fixed session name being lost after context compaction \u2014 renamed sessions now preserve their custom title through compaction (anthropics\/claude-code#26121)","category":"cli","change_type":"bugfix","complexity":"moderate","user_facing":"Yes"},{"date":"2026-02-18","text":"Increased initial session count in resume picker from 10 to 50 for faster session discovery (anthropics\/claude-code#26123)","category":"performance","change_type":"improvement","complexity":"minor","user_facing":"Yes"},{"date":"2026-02-18","text":"Windows: fixed worktree session matching when drive letter casing differs (anthropics\/claude-code#26123)","category":"agents","change_type":"bugfix","complexity":"minor","user_facing":"Yes"},{"date":"2026-02-18","text":"Fixed `\/resume <session-id>` failing to find sessions whose first message exceeds 16KB (anthropics\/claude-code#25920)","category":"cli","change_type":"bugfix","complexity":"moderate","user_facing":"Yes"},{"date":"2026-02-18","text":"Fixed \"Always allow\" on multiline bash commands creating invalid permission patterns that corrupt settings (anthropics\/claude-code#25909)","category":"permissions","change_type":"bugfix","complexity":"moderate","user_facing":"Yes"},{"date":"2026-02-18","text":"Fixed React crash (error #31) when a skill's `argument-hint` in SKILL.md frontmatter uses YAML sequence syntax (e.g., `[topic: foo | bar]`) \u2014 the value is now properly coerced to a string (anthropics\/claude-code#25826)","category":"plugins","change_type":"bugfix","complexity":"minor","user_facing":"Yes"},{"date":"2026-02-18","text":"Fixed crash when using `\/fork` on sessions that used web search \u2014 null entries in search results from transcript deserialization are now handled gracefully (anthropics\/claude-code#25811)","category":"cli","change_type":"bugfix","complexity":"minor","user_facing":"Yes"},{"date":"2026-02-18","text":"Fixed read-only git commands triggering FSEvents file watcher loops on macOS by adding --no-optional-locks flag (anthropics\/claude-code#25750)","category":"performance","change_type":"bugfix","complexity":"minor","user_facing":"Yes"},{"date":"2026-02-18","text":"Fixed custom agents and skills not being discovered when running from a git worktree \u2014 project-level `.claude\/agents\/` and `.claude\/skills\/` from the main repository are now included (anthropics\/claude-code#25816)","category":"agents","change_type":"bugfix","complexity":"moderate","user_facing":"Yes"},{"date":"2026-02-18","text":"Fixed non-interactive subcommands like `claude doctor` and `claude plugin validate` being blocked inside nested Claude sessions (anthropics\/claude-code#25803)","category":"cli","change_type":"bugfix","complexity":"minor","user_facing":"Yes"},{"date":"2026-02-18","text":"Windows: Fixed the same CLAUDE.md file being loaded twice when drive letter casing differs between paths (anthropics\/claude-code#25756)","category":"config","change_type":"bugfix","complexity":"minor","user_facing":"No"},{"date":"2026-02-18","text":"Fixed inline code spans in markdown being incorrectly parsed as bash commands (anthropics\/claude-code#25792)","category":"cli","change_type":"bugfix","complexity":"minor","user_facing":"Yes"},{"date":"2026-02-18","text":"Fixed teammate spinners not respecting custom spinnerVerbs from settings (anthropics\/claude-code#25748)","category":"config","change_type":"bugfix","complexity":"minor","user_facing":"Yes"},{"date":"2026-02-18","text":"Fixed shell commands permanently failing after a command deletes its own working directory (anthropics\/claude-code#26136)","category":"cli","change_type":"bugfix","complexity":"minor","user_facing":"Yes"},{"date":"2026-02-18","text":"Fixed hooks (PreToolUse, PostToolUse) silently failing to execute on Windows by using Git Bash instead of cmd.exe (anthropics\/claude-code#25981)","category":"hooks","change_type":"bugfix","complexity":"minor","user_facing":"Yes"},{"date":"2026-02-18","text":"Fixed LSP `findReferences` and other location-based operations returning results from gitignored files (e.g., `node_modules\/`, `venv\/`) (anthropics\/claude-code#26051)","category":"ide","change_type":"bugfix","complexity":"minor","user_facing":"Yes"},{"date":"2026-02-18","text":"Moved config backup files from home directory root to `~\/.claude\/backups\/` to reduce home directory clutter (anthropics\/claude-code#26130)","category":"config","change_type":"improvement","complexity":"minor","user_facing":"Yes"},{"date":"2026-02-18","text":"Fixed sessions with large first prompts (>16KB) disappearing from the \/resume list (anthropics\/claude-code#26140)","category":"cli","change_type":"bugfix","complexity":"minor","user_facing":"Yes"},{"date":"2026-02-18","text":"Fixed shell functions with double-underscore prefixes (e.g., `__git_ps1`) not being preserved across shell sessions (anthropics\/claude-code#25824)","category":"cli","change_type":"bugfix","complexity":"minor","user_facing":"Yes"},{"date":"2026-02-18","text":"Fixed spinner showing \"0 tokens\" counter before any tokens have been received (anthropics\/claude-code#26105)","category":"cli","change_type":"bugfix","complexity":"minor","user_facing":"Yes"},{"date":"2026-02-18","text":"VSCode: Fixed conversation messages appearing dimmed while the AskUserQuestion dialog is open (anthropics\/claude-code#26078)","category":"ide","change_type":"bugfix","complexity":"minor","user_facing":"Yes"},{"date":"2026-02-18","text":"Fixed background tasks failing in git worktrees due to remote URL resolution reading from worktree-specific gitdir instead of the main repository config (anthropics\/claude-code#26065)","category":"agents","change_type":"bugfix","complexity":"minor","user_facing":"No"},{"date":"2026-02-18","text":"Fixed Right Alt key leaving visible `[25~` escape sequence residue in the input field on Windows\/Git Bash terminals (anthropics\/claude-code#25943)","category":"cli","change_type":"bugfix","complexity":"minor","user_facing":"Yes"},{"date":"2026-02-18","text":"The `\/rename` command now updates the terminal tab title by default (anthropics\/claude-code#25789)","category":"cli","change_type":"feature","complexity":"minor","user_facing":"Yes"},{"date":"2026-02-18","text":"Fixed Edit tool silently corrupting Unicode curly quotes (\\u201c\\u201d \\u2018\\u2019) by replacing them with straight quotes when making edits (anthropics\/claude-code#26141)","category":"cli","change_type":"bugfix","complexity":"minor","user_facing":"Yes"},{"date":"2026-02-18","text":"Fixed OSC 8 hyperlinks only being clickable on the first line when link text wraps across multiple terminal lines.","category":"cli","change_type":"bugfix","complexity":"minor","user_facing":"Yes"},{"date":"2026-02-19","text":"Improved MCP OAuth authentication with step-up auth support and discovery caching, reducing redundant network requests during server connections","category":"mcp","change_type":"improvement","complexity":"moderate","user_facing":"Yes"},{"date":"2026-02-19","text":"Added `--worktree` (`-w`) flag to start Claude in an isolated git worktree","category":"agents","change_type":"feature","complexity":"moderate","user_facing":"Yes"},{"date":"2026-02-19","text":"Subagents support `isolation: \"worktree\"` for working in a temporary git worktree","category":"agents","change_type":"feature","complexity":"moderate","user_facing":"Yes"},{"date":"2026-02-19","text":"Added Ctrl+F keybinding to kill background agents (two-press confirmation)","category":"agents","change_type":"feature","complexity":"minor","user_facing":"Yes"},{"date":"2026-02-19","text":"Agent definitions support `background: true` to always run as a background task","category":"agents","change_type":"feature","complexity":"minor","user_facing":"Yes"},{"date":"2026-02-19","text":"Plugins can ship `settings.json` for default configuration","category":"plugins","change_type":"feature","complexity":"minor","user_facing":"Yes"},{"date":"2026-02-19","text":"Fixed file-not-found errors to suggest corrected paths when the model drops the repo folder","category":"cli","change_type":"improvement","complexity":"minor","user_facing":"Yes"},{"date":"2026-02-19","text":"Fixed Ctrl+C and ESC being silently ignored when background agents are running and the main thread is idle. Pressing twice within 3 seconds now kills all background agents.","category":"agents","change_type":"bugfix","complexity":"moderate","user_facing":"Yes"},{"date":"2026-02-19","text":"Fixed prompt suggestion cache regression that reduced cache hit rates.","category":"performance","change_type":"bugfix","complexity":"minor","user_facing":"Yes"},{"date":"2026-02-19","text":"Fixed `plugin enable` and `plugin disable` to auto-detect the correct scope when `--scope` is not specified, instead of always defaulting to user scope","category":"plugins","change_type":"improvement","complexity":"minor","user_facing":"Yes"},{"date":"2026-02-19","text":"Simple mode (`CLAUDE_CODE_SIMPLE`) now includes the file edit tool in addition to the Bash tool, allowing direct file editing in simple mode.","category":"cli","change_type":"feature","complexity":"minor","user_facing":"Yes"},{"date":"2026-02-19","text":"Permission suggestions are now populated when safety checks trigger an ask response, enabling SDK consumers to display permission options","category":"permissions","change_type":"feature","complexity":"minor","user_facing":"Yes"},{"date":"2026-02-19","text":"Sonnet 4.5 with 1M context is being removed from the Max plan in favor of our frontier Sonnet 4.6 model, which now has 1M context. Please switch in \/model.","category":"config","change_type":"feature","complexity":"minor","user_facing":"Yes"},{"date":"2026-02-19","text":"Fixed verbose mode not updating thinking block display when toggled via `\/config` \u2014 memo comparators now correctly detect verbose changes","category":"cli","change_type":"bugfix","complexity":"minor","user_facing":"Yes"},{"date":"2026-02-19","text":"Fixed unbounded WASM memory growth during long sessions by periodically resetting the tree-sitter parser","category":"performance","change_type":"bugfix","complexity":"major","user_facing":"No"},{"date":"2026-02-19","text":"Fixed potential rendering issues caused by stale yoga layout references","category":"cli","change_type":"bugfix","complexity":"minor","user_facing":"No"},{"date":"2026-02-19","text":"Improved performance in non-interactive mode (`-p`) by skipping unnecessary API calls during startup","category":"performance","change_type":"improvement","complexity":"moderate","user_facing":"Yes"},{"date":"2026-02-19","text":"Improved performance by caching authentication failures for HTTP and SSE MCP servers, avoiding repeated connection attempts to servers requiring auth","category":"performance","change_type":"bugfix","complexity":"major","user_facing":"No"},{"date":"2026-02-19","text":"Fixed unbounded memory growth during long-running sessions caused by Yoga WASM linear memory never shrinking","category":"api","change_type":"feature","complexity":"minor","user_facing":"No"},{"date":"2026-02-19","text":"SDK model info now includes `supportsEffort`, `supportedEffortLevels`, and `supportsAdaptiveThinking` fields so consumers can discover model capabilities.","category":"hooks","change_type":"feature","complexity":"moderate","user_facing":"No"},{"date":"2026-02-19","text":"Added `ConfigChange` hook event that fires when configuration files change during a session, enabling enterprise security auditing and optional blocking of settings changes.","category":"performance","change_type":"improvement","complexity":"minor","user_facing":"Yes"},{"date":"2026-02-19","text":"Improved startup performance by caching MCP auth failures to avoid redundant connection attempts","category":"performance","change_type":"improvement","complexity":"minor","user_facing":"Yes"},{"date":"2026-02-19","text":"Improved startup performance by reducing HTTP calls for analytics token counting","category":"performance","change_type":"improvement","complexity":"minor","user_facing":"Yes"},{"date":"2026-02-19","text":"Improved startup performance by batching MCP tool token counting into a single API call","category":"permissions","change_type":"bugfix","complexity":"moderate","user_facing":"Yes"},{"date":"2026-02-19","text":"Fixed `disableAllHooks` setting to respect managed settings hierarchy \u2014 non-managed settings can no longer disable managed hooks set by policy (#26637)","category":"cli","change_type":"bugfix","complexity":"minor","user_facing":"Yes"},{"date":"2026-02-19","text":"Fixed `--resume` session picker showing raw XML tags for sessions that start with commands like `\/clear`. Now correctly falls through to the session ID fallback.","category":"permissions","change_type":"improvement","complexity":"minor","user_facing":"Yes"},{"date":"2026-02-19","text":"Improved permission prompts for path safety and working directory blocks to show the reason for the restriction instead of a bare prompt with no context","category":"cli","change_type":"bugfix","complexity":"minor","user_facing":"Yes"},{"date":"2026-02-20","text":"Added support for `startupTimeout` configuration for LSP servers","category":"config","change_type":"feature","complexity":"minor","user_facing":"Yes"},{"date":"2026-02-20","text":"Added `WorktreeCreate` and `WorktreeRemove` hook events, enabling custom VCS setup and teardown when agent worktree isolation creates or removes worktrees.","category":"hooks","change_type":"feature","complexity":"moderate","user_facing":"Yes"},{"date":"2026-02-20","text":"Fixed a bug where resumed sessions could be invisible when the working directory involved symlinks, because the session storage path was resolved at different times during startup. Also fixed session data loss on SSH disconnect by flushing session data before hooks and analytics in the graceful shutdown sequence.","category":"cli","change_type":"bugfix","complexity":"moderate","user_facing":"Yes"},{"date":"2026-02-20","text":"Linux: Fixed native modules not loading on systems with glibc older than 2.30 (e.g., RHEL 8)","category":"performance","change_type":"bugfix","complexity":"minor","user_facing":"Yes"},{"date":"2026-02-20","text":"Fixed memory leak in agent teams where completed teammate tasks were never garbage collected from session state","category":"agents","change_type":"bugfix","complexity":"moderate","user_facing":"No"},{"date":"2026-02-20","text":"Fixed `CLAUDE_CODE_SIMPLE` to fully strip down skills, session memory, custom agents, and CLAUDE.md token counting","category":"config","change_type":"bugfix","complexity":"minor","user_facing":"Yes"},{"date":"2026-02-20","text":"Fixed `\/mcp reconnect` freezing the CLI when given a server name that doesn't exist","category":"mcp","change_type":"bugfix","complexity":"minor","user_facing":"Yes"},{"date":"2026-02-20","text":"Fixed memory leak where completed task state objects were never removed from AppState","category":"performance","change_type":"bugfix","complexity":"minor","user_facing":"No"},{"date":"2026-02-20","text":"Added support for `isolation: worktree` in agent definitions, allowing agents to declaratively run in isolated git worktrees.","category":"agents","change_type":"feature","complexity":"moderate","user_facing":"Yes"},{"date":"2026-02-20","text":"`CLAUDE_CODE_SIMPLE` mode now also disables MCP tools, attachments, hooks, and CLAUDE.md file loading for a fully minimal experience.","category":"config","change_type":"improvement","complexity":"minor","user_facing":"Yes"},{"date":"2026-02-20","text":"Fixed bug where MCP tools were not discovered when tool search is enabled and a prompt is passed in as a launch argument","category":"mcp","change_type":"bugfix","complexity":"minor","user_facing":"Yes"},{"date":"2026-02-20","text":"Improved memory usage during long sessions by clearing internal caches after compaction","category":"performance","change_type":"improvement","complexity":"minor","user_facing":"No"},{"date":"2026-02-20","text":"Added `claude agents` CLI command to list all configured agents","category":"agents","change_type":"feature","complexity":"minor","user_facing":"Yes"},{"date":"2026-02-20","text":"Improved memory usage during long sessions by clearing large tool results after they have been processed","category":"performance","change_type":"improvement","complexity":"minor","user_facing":"No"},{"date":"2026-02-20","text":"Fixed a memory leak where LSP diagnostic data was never cleaned up after delivery, causing unbounded memory growth in long sessions","category":"performance","change_type":"bugfix","complexity":"moderate","user_facing":"No"},{"date":"2026-02-20","text":"Fixed a memory leak where completed task output was not freed from memory, reducing memory usage in long sessions with many tasks","category":"performance","change_type":"bugfix","complexity":"moderate","user_facing":"No"},{"date":"2026-02-20","text":"Improved startup performance for headless mode (`-p` flag) by deferring Yoga WASM and UI component imports","category":"performance","change_type":"improvement","complexity":"minor","user_facing":"Yes"},{"date":"2026-02-20","text":"Fixed prompt suggestion cache regression that reduced cache hit rates","category":"performance","change_type":"bugfix","complexity":"minor","user_facing":"Yes"},{"date":"2026-02-20","text":"Fixed unbounded memory growth in long sessions by capping file history snapshots","category":"performance","change_type":"bugfix","complexity":"moderate","user_facing":"Yes"},{"date":"2026-02-20","text":"Added `CLAUDE_CODE_DISABLE_1M_CONTEXT` environment variable to disable 1M context window support","category":"config","change_type":"feature","complexity":"minor","user_facing":"Yes"},{"date":"2026-02-20","text":"Opus 4.6 (fast mode) now includes the full 1M context window","category":"api","change_type":"improvement","complexity":"minor","user_facing":"Yes"},{"date":"2026-02-20","text":"VSCode: Added `\/extra-usage` command support in VS Code sessions","category":"ide","change_type":"feature","complexity":"minor","user_facing":"Yes"},{"date":"2026-02-20","text":"Fixed memory leak where TaskOutput retained recent lines after cleanup","category":"performance","change_type":"bugfix","complexity":"moderate","user_facing":"No"},{"date":"2026-02-20","text":"Fixed memory leak in CircularBuffer where cleared items were retained in the backing array","category":"performance","change_type":"bugfix","complexity":"moderate","user_facing":"No"},{"date":"2026-02-20","text":"Fixed memory leak in shell command execution where ChildProcess and AbortController references were retained after cleanup","category":"performance","change_type":"bugfix","complexity":"moderate","user_facing":"No"},{"date":"2026-02-23","text":"Added `claude remote-control` subcommand for external builds, enabling local environment serving for all users.","category":"agents","change_type":"feature","complexity":"major","user_facing":"Yes"},{"date":"2026-02-23","text":"Updated plugin marketplace default git timeout from 30s to 120s and added `CLAUDE_CODE_PLUGIN_GIT_TIMEOUT_MS` to configure.","category":"plugins","change_type":"improvement","complexity":"minor","user_facing":"Yes"},{"date":"2026-02-23","text":"Added support for custom npm registries and specific version pinning when installing plugins from npm sources","category":"plugins","change_type":"feature","complexity":"moderate","user_facing":"Yes"},{"date":"2026-02-23","text":"BashTool now skips login shell (`-l` flag) by default when a shell snapshot is available, improving command execution performance. Previously this required setting `CLAUDE_BASH_NO_LOGIN=true`.","category":"cli","change_type":"improvement","complexity":"minor","user_facing":"Yes"},{"date":"2026-02-23","text":"Fixed a security issue where `statusLine` and `fileSuggestion` hook commands could execute without workspace trust acceptance in interactive mode.","category":"permissions","change_type":"bugfix","complexity":"moderate","user_facing":"No"},{"date":"2026-02-23","text":"Tool results larger than 50K characters are now persisted to disk (previously 100K). This reduces context window usage and improves conversation longevity.","category":"performance","change_type":"improvement","complexity":"moderate","user_facing":"Yes"},{"date":"2026-02-23","text":"Fixed a bug where duplicate `control_response` messages (e.g. from WebSocket reconnects) could cause API 400 errors by pushing duplicate assistant messages into the conversation.","category":"api","change_type":"bugfix","complexity":"moderate","user_facing":"No"},{"date":"2026-02-23","text":"Added `CLAUDE_CODE_ACCOUNT_UUID`, `CLAUDE_CODE_USER_EMAIL`, and `CLAUDE_CODE_ORGANIZATION_UUID` environment variables for SDK callers to provide account info synchronously, eliminating a race condition where early telemetry events lacked account metadata.","category":"config","change_type":"feature","complexity":"minor","user_facing":"No"},{"date":"2026-02-23","text":"Fixed slash command autocomplete crashing when a plugin's SKILL.md description is a YAML array or other non-string type","category":"plugins","change_type":"bugfix","complexity":"minor","user_facing":"Yes"},{"date":"2026-02-23","text":"The `\/model` picker now shows human-readable labels (e.g., \"Sonnet 4.5\") instead of raw model IDs for pinned model versions, with an upgrade hint when a newer version is available.","category":"cli","change_type":"improvement","complexity":"minor","user_facing":"Yes"},{"date":"2026-02-23","text":"Managed settings can now be set via macOS plist or Windows Registry. Learn more at https:\/\/code.claude.com\/docs\/en\/settings#settings-files","category":"config","change_type":"feature","complexity":"moderate","user_facing":"Yes"},{"date":"2026-02-24","text":"VS Code: Fixed extension crash on Windows (\"command 'claude-vscode.editor.openLast' not found\")","category":"ide","change_type":"bugfix","complexity":"minor","user_facing":"Yes"},{"date":"2026-02-24","text":"Fixed a UI flicker where user input would briefly disappear after submission before the message rendered","category":"cli","change_type":"bugfix","complexity":"minor","user_facing":"Yes"},{"date":"2026-02-24","text":"Fixed bulk agent kill (ctrl+f) to send a single aggregate notification instead of one per agent, and to properly clear the command queue","category":"agents","change_type":"bugfix","complexity":"moderate","user_facing":"Yes"},{"date":"2026-02-24","text":"Fixed graceful shutdown sometimes leaving stale sessions when using Remote Control by parallelizing teardown network calls","category":"agents","change_type":"bugfix","complexity":"moderate","user_facing":"No"},{"date":"2026-02-24","text":"Fixed `--worktree` sometimes being ignored on first launch","category":"cli","change_type":"bugfix","complexity":"minor","user_facing":"Yes"},{"date":"2026-02-24","text":"Fixed a panic (\"switch on corrupted value\") on Windows","category":"cli","change_type":"bugfix","complexity":"minor","user_facing":"Yes"},{"date":"2026-02-24","text":"Fixed a crash that could occur when spawning many processes on Windows","category":"cli","change_type":"bugfix","complexity":"minor","user_facing":"Yes"},{"date":"2026-02-24","text":"Fixed a crash in the WebAssembly interpreter on Linux x64 & Windows x64","category":"cli","change_type":"bugfix","complexity":"minor","user_facing":"Yes"},{"date":"2026-02-24","text":"Fixed a crash that sometimes occurred after 2 minutes on Windows ARM64","category":"cli","change_type":"bugfix","complexity":"minor","user_facing":"Yes"},{"date":"2026-02-25","text":"Fixed BashTool failing on Windows with EINVAL error","category":"cli","change_type":"bugfix","complexity":"minor","user_facing":"Yes"},{"date":"2026-02-25","text":"VS Code: Fixed another cause of \"command 'claude-vscode.editor.openLast' not found\" crashes","category":"ide","change_type":"bugfix","complexity":"minor","user_facing":"Yes"},{"date":"2026-02-25","text":"Expand Remote Control to more users","category":"agents","change_type":"feature","complexity":"moderate","user_facing":"Yes"},{"date":"2026-02-25","text":"Claude automatically saves useful context to auto-memory. Manage with \/memory","category":"cli","change_type":"feature","complexity":"major","user_facing":"Yes"},{"date":"2026-02-25","text":"Added `\/copy` command to show an interactive picker when code blocks are present, allowing selection of individual code blocks or the full response.","category":"cli","change_type":"feature","complexity":"moderate","user_facing":"Yes"},{"date":"2026-02-25","text":"Improved \"always allow\" prefix suggestions for compound bash commands (e.g. `cd \/tmp && git fetch && git push`) to compute smarter per-subcommand prefixes instead of treating the whole command as one","category":"permissions","change_type":"improvement","complexity":"moderate","user_facing":"Yes"},{"date":"2026-02-25","text":"Improved ordering of short task lists","category":"cli","change_type":"improvement","complexity":"minor","user_facing":"Yes"},{"date":"2026-02-25","text":"Improved memory usage in multi-agent sessions by releasing completed subagent task state","category":"agents","change_type":"improvement","complexity":"moderate","user_facing":"Yes"},{"date":"2026-02-25","text":"Fixed MCP OAuth token refresh race condition when running multiple Claude Code instances simultaneously","category":"mcp","change_type":"bugfix","complexity":"moderate","user_facing":"Yes"},{"date":"2026-02-25","text":"Fixed shell commands not showing a clear error message when the working directory has been deleted","category":"cli","change_type":"bugfix","complexity":"minor","user_facing":"Yes"},{"date":"2026-02-25","text":"Fixed config file corruption that could wipe authentication when multiple Claude Code instances ran simultaneously","category":"config","change_type":"bugfix","complexity":"major","user_facing":"Yes"},{"date":"2026-02-26","text":"Fixed concurrent writes corrupting config file on Windows","category":"config","change_type":"bugfix","complexity":"moderate","user_facing":"Yes"},{"date":"2026-02-27","text":"Fixed prompt suggestion cache regression that reduced cache hit rates","category":"performance","change_type":"bugfix","complexity":"minor","user_facing":"No"},{"date":"2026-02-28","text":"Added `\/simplify` and `\/batch` bundled slash commands","category":"cli","change_type":"feature","complexity":"minor","user_facing":"Yes"},{"date":"2026-02-28","text":"Fixed local slash command output like \/cost appearing as user-sent messages instead of system messages in the UI","category":"cli","change_type":"bugfix","complexity":"minor","user_facing":"Yes"},{"date":"2026-02-28","text":"Project configs & auto memory now shared across git worktrees of the same repository","category":"config","change_type":"improvement","complexity":"moderate","user_facing":"Yes"},{"date":"2026-02-28","text":"Added `ENABLE_CLAUDEAI_MCP_SERVERS=false` env var to opt out from making claude.ai MCP servers available","category":"mcp","change_type":"feature","complexity":"minor","user_facing":"Yes"},{"date":"2026-02-28","text":"Improved `\/model` command to show the currently active model in the slash command menu","category":"cli","change_type":"improvement","complexity":"minor","user_facing":"Yes"},{"date":"2026-02-28","text":"Added HTTP hooks, which can POST JSON to a URL and receive JSON instead of running a shell command","category":"hooks","change_type":"feature","complexity":"moderate","user_facing":"Yes"},{"date":"2026-02-28","text":"Fixed listener leak in bridge polling loop","category":"performance","change_type":"bugfix","complexity":"minor","user_facing":"No"},{"date":"2026-02-28","text":"Fixed listener leak in MCP OAuth flow cleanup","category":"mcp","change_type":"bugfix","complexity":"minor","user_facing":"No"},{"date":"2026-02-28","text":"Added manual URL paste fallback during MCP OAuth authentication. If the automatic localhost redirect doesn't work, you can paste the callback URL to complete authentication.","category":"mcp","change_type":"improvement","complexity":"minor","user_facing":"Yes"},{"date":"2026-02-28","text":"Fixed memory leak when navigating hooks configuration menu","category":"performance","change_type":"bugfix","complexity":"minor","user_facing":"No"},{"date":"2026-02-28","text":"Fixed listener leak in interactive permission handler during auto-approvals","category":"performance","change_type":"bugfix","complexity":"minor","user_facing":"No"},{"date":"2026-02-28","text":"Fixed file count cache ignoring glob ignore patterns","category":"performance","change_type":"bugfix","complexity":"minor","user_facing":"No"},{"date":"2026-02-28","text":"Fixed memory leak in bash command prefix cache","category":"performance","change_type":"bugfix","complexity":"minor","user_facing":"No"},{"date":"2026-02-28","text":"Fixed MCP tool\/resource cache leak on server reconnect","category":"mcp","change_type":"bugfix","complexity":"minor","user_facing":"No"},{"date":"2026-02-28","text":"Fixed IDE host IP detection cache incorrectly sharing results across ports","category":"ide","change_type":"bugfix","complexity":"minor","user_facing":"No"},{"date":"2026-02-28","text":"Fixed WebSocket listener leak on transport reconnect","category":"performance","change_type":"bugfix","complexity":"minor","user_facing":"No"},{"date":"2026-02-28","text":"Fixed memory leak in git root detection cache that could cause unbounded growth in long-running sessions","category":"performance","change_type":"bugfix","complexity":"moderate","user_facing":"Yes"},{"date":"2026-02-28","text":"Fixed memory leak in JSON parsing cache that grew unbounded over long sessions","category":"performance","change_type":"bugfix","complexity":"moderate","user_facing":"Yes"},{"date":"2026-02-28","text":"VSCode: Fixed remote sessions not appearing in conversation history","category":"ide","change_type":"bugfix","complexity":"moderate","user_facing":"Yes"},{"date":"2026-02-28","text":"Fixed a race condition in the REPL bridge where new messages could arrive at the server interleaved with historical messages during the initial connection flush, causing message ordering issues.","category":"cli","change_type":"bugfix","complexity":"major","user_facing":"Yes"},{"date":"2026-02-28","text":"Fixed memory leak where long-running teammates retained all messages in AppState even after conversation compaction","category":"agents","change_type":"bugfix","complexity":"moderate","user_facing":"Yes"},{"date":"2026-02-28","text":"Fixed a memory leak where MCP server fetch caches were not cleared on disconnect, causing growing memory usage with servers that reconnect frequently","category":"mcp","change_type":"bugfix","complexity":"moderate","user_facing":"Yes"},{"date":"2026-02-28","text":"Improved memory usage in long sessions with subagents by stripping heavy progress message payloads during context compaction","category":"agents","change_type":"improvement","complexity":"moderate","user_facing":"Yes"},{"date":"2026-02-28","text":"Added \"Always copy full response\" option to the `\/copy` picker. When selected, future `\/copy` commands will skip the code block picker and copy the full response directly.","category":"cli","change_type":"feature","complexity":"minor","user_facing":"Yes"},{"date":"2026-02-28","text":"VSCode: Added session rename and remove actions to the sessions list","category":"ide","change_type":"feature","complexity":"minor","user_facing":"Yes"},{"date":"2026-02-28","text":"Fixed `\/clear` not resetting cached skills, which could cause stale skill content to persist in the new conversation","category":"cli","change_type":"bugfix","complexity":"minor","user_facing":"Yes"},{"date":"2026-03-04","text":"Reduced spurious error logging","category":"performance","change_type":"bugfix","complexity":"minor","user_facing":"No"},{"date":"2026-03-04","text":"Opus 4.6 now defaults to medium effort for Max and Team subscribers. Medium effort works well for most tasks \u2014 it's the sweet spot between speed and thoroughness. You can change this anytime with `\/model`","category":"config","change_type":"improvement","complexity":"minor","user_facing":"Yes"},{"date":"2026-03-04","text":"Re-introduced the \"ultrathink\" keyword to enable high effort for the next turn","category":"cli","change_type":"feature","complexity":"minor","user_facing":"Yes"},{"date":"2026-03-04","text":"Removed Opus 4 and 4.1 from Claude Code on the first-party API \u2014 users with these models pinned are automatically moved to Opus 4.6","category":"api","change_type":"breaking","complexity":"moderate","user_facing":"Yes"},{"date":"2026-03-04","text":"Added the `\/claude-api` skill for building applications with the Claude API and Anthropic SDK","category":"cli","change_type":"feature","complexity":"moderate","user_facing":"Yes"},{"date":"2026-03-04","text":"Added Ctrl+U on an empty bash prompt (`!`) to exit bash mode, matching `escape` and `backspace`","category":"cli","change_type":"feature","complexity":"minor","user_facing":"Yes"},{"date":"2026-03-04","text":"Added numeric keypad support for selecting options in Claude's interview questions (previously only the number row above QWERTY worked)","category":"cli","change_type":"improvement","complexity":"minor","user_facing":"Yes"},{"date":"2026-03-04","text":"Added optional name argument to `\/remote-control` and `claude remote-control` (`\/remote-control My Project` or `--name \"My Project\"`) to set a custom session title visible in claude.ai\/code","category":"cli","change_type":"feature","complexity":"minor","user_facing":"Yes"},{"date":"2026-03-04","text":"Added Voice STT support for 10 new languages (20 total) \u2014 Russian, Polish, Turkish, Dutch, Ukrainian, Greek, Czech, Danish, Swedish, Norwegian","category":"voice","change_type":"feature","complexity":"moderate","user_facing":"Yes"},{"date":"2026-03-04","text":"Added effort level display (e.g., \"with low effort\") to the logo and spinner, making it easier to see which effort setting is active","category":"cli","change_type":"improvement","complexity":"minor","user_facing":"Yes"},{"date":"2026-03-04","text":"Added agent name display in terminal title when using `claude --agent`","category":"agents","change_type":"improvement","complexity":"minor","user_facing":"Yes"},{"date":"2026-03-04","text":"Added `sandbox.enableWeakerNetworkIsolation` setting (macOS only) to allow Go programs like `gh`, `gcloud`, and `terraform` to verify TLS certificates when using a custom MITM proxy with `httpProxyPort`","category":"config","change_type":"feature","complexity":"moderate","user_facing":"Yes"},{"date":"2026-03-04","text":"Added `includeGitInstructions` setting (and `CLAUDE_CODE_DISABLE_GIT_INSTRUCTIONS` env var) to remove built-in commit and PR workflow instructions from Claude's system prompt","category":"config","change_type":"feature","complexity":"minor","user_facing":"Yes"},{"date":"2026-03-04","text":"Added `\/reload-plugins` command to activate pending plugin changes without restarting","category":"plugins","change_type":"feature","complexity":"minor","user_facing":"Yes"},{"date":"2026-03-04","text":"Added a one-time startup prompt suggesting Claude Code Desktop on macOS and Windows (max 3 showings, dismissible)","category":"cli","change_type":"feature","complexity":"minor","user_facing":"Yes"},{"date":"2026-03-04","text":"Added `${CLAUDE_SKILL_DIR}` variable for skills to reference their own directory in SKILL.md content","category":"plugins","change_type":"feature","complexity":"minor","user_facing":"No"},{"date":"2026-03-04","text":"Added `InstructionsLoaded` hook event that fires when CLAUDE.md or `.claude\/rules\/*.md` files are loaded into context","category":"hooks","change_type":"feature","complexity":"minor","user_facing":"No"},{"date":"2026-03-04","text":"Added `agent_id` (for subagents) and `agent_type` (for subagents and `--agent`) to hook events","category":"hooks","change_type":"feature","complexity":"minor","user_facing":"No"},{"date":"2026-03-04","text":"Added `worktree` field to status line hook commands with name, path, branch, and original repo directory when running in a `--worktree` session","category":"hooks","change_type":"feature","complexity":"minor","user_facing":"No"},{"date":"2026-03-04","text":"Added `pluginTrustMessage` in managed settings to append organization-specific context to the plugin trust warning shown before installation","category":"plugins","change_type":"feature","complexity":"minor","user_facing":"Yes"},{"date":"2026-03-04","text":"Added policy limit fetching (e.g., remote control restrictions) for Team plan OAuth users, not just Enterprise","category":"mcp","change_type":"feature","complexity":"minor","user_facing":"Yes"},{"date":"2026-03-04","text":"Added `pathPattern` to `strictKnownMarketplaces` for regex-matching file\/directory marketplace sources alongside `hostPattern` restrictions","category":"plugins","change_type":"feature","complexity":"moderate","user_facing":"No"},{"date":"2026-03-04","text":"Added plugin source type `git-subdir` to point to a subdirectory within a git repo","category":"plugins","change_type":"feature","complexity":"minor","user_facing":"Yes"},{"date":"2026-03-04","text":"Added `oauth.authServerMetadataUrl` config option for MCP servers to specify a custom OAuth metadata discovery URL when standard discovery fails","category":"mcp","change_type":"feature","complexity":"minor","user_facing":"No"},{"date":"2026-03-04","text":"Fixed a security issue where nested skill discovery could load skills from gitignored directories like `node_modules`","category":"permissions","change_type":"bugfix","complexity":"moderate","user_facing":"Yes"},{"date":"2026-03-04","text":"Fixed trust dialog silently enabling all `.mcp.json` servers on first run. You'll now see the per-server approval dialog as expected","category":"permissions","change_type":"bugfix","complexity":"minor","user_facing":"Yes"},{"date":"2026-03-04","text":"Fixed `claude remote-control` crashing immediately on npm installs with \"bad option: --sdk-url\" (anthropics\/claude-code#28334)","category":"cli","change_type":"bugfix","complexity":"minor","user_facing":"Yes"},{"date":"2026-03-04","text":"Fixed `--model claude-opus-4-0` and `--model claude-opus-4-1` resolving to deprecated Opus versions instead of current","category":"config","change_type":"bugfix","complexity":"minor","user_facing":"Yes"},{"date":"2026-03-04","text":"Fixed macOS keychain corruption when using multiple OAuth MCP servers. Large OAuth metadata blobs could overflow the `security -i` stdin buffer, silently leaving stale credentials behind and causing repeated `\/login` prompts.","category":"mcp","change_type":"bugfix","complexity":"major","user_facing":"Yes"},{"date":"2026-03-04","text":"Fixed `.credentials.json` losing `subscriptionType` (showing \"Claude A
